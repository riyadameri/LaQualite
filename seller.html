<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة تحكم البائع - لا كاليتي بالون</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin: 50px auto;
            max-width: 400px;
            animation: slideUp 0.5s ease;
        }

        .login-card h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
            border-bottom: 3px solid #ff4444;
            padding-bottom: 10px;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-input:focus {
            border-color: #ff4444;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,68,68,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff4444, #ff6b6b);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 15px;
            position: relative;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .dashboard {
            display: none;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 5px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            border-radius: 20px 20px 0 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 10px;
            transition: all 0.3s;
            flex: 1;
        }

        .nav-item.active {
            color: #ff4444;
            background: rgba(255,68,68,0.1);
        }

        .nav-item i {
            font-size: 24px;
            margin-bottom: 3px;
        }

        .content {
            padding-bottom: 80px;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 20px;
            color: #333;
            border-right: 4px solid #ff4444;
            padding-right: 10px;
        }

        .store-name {
            color: #ff4444;
            font-weight: bold;
            font-size: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card.blue {
            background: linear-gradient(135deg, #2196F3, #21CBF3);
            color: white;
        }

        .stat-card.red {
            background: linear-gradient(135deg, #ff4444, #ff6b6b);
            color: white;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            margin: 5px 0;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 120px;
            background: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #ff4444, #ff6b6b);
            color: white;
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, #2196F3, #21CBF3);
            color: white;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .form-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .form-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-title i {
            color: #ff4444;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
            font-weight: bold;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: #ff4444;
            outline: none;
        }

        /* Enhanced styles for multiple image upload */
        .image-upload-area {
            border: 2px dashed #ff4444;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            background: #fff5f5;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }

        .image-upload-area:hover {
            background: #ffe5e5;
            border-color: #ff6b6b;
        }

        .image-upload-area i {
            font-size: 40px;
            color: #ff4444;
            margin-bottom: 10px;
        }

        .image-upload-area.small {
            padding: 15px;
            margin: 5px 0;
        }

        .image-upload-area.small i {
            font-size: 24px;
        }

        .preview-image {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 10px;
        }

        .multiple-image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin: 10px 0;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }

        .image-preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #ff4444;
        }

        .preview-image-small {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-image-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #ff4444;
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .color-basic-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .color-images-section {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .badge {
            background: #ff4444;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-right: 5px;
        }

        .feature-row {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-right: 4px solid #ff4444;
        }

        .option-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .option-input {
            flex: 1;
            min-width: 100px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .remove-btn {
            background: #ff4444;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .product-price {
            color: #ff4444;
            font-size: 18px;
            font-weight: bold;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #eee;
        }

        .product-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .product-btn.edit {
            background: #2196F3;
            color: white;
        }

        .product-btn.delete {
            background: #ff4444;
            color: white;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 15px 0;
        }

        .order-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-right: 4px solid;
        }

        .order-card.status-pending { border-color: #FFC107; }
        .order-card.status-confirmed { border-color: #2196F3; }
        .order-card.status-shipped { border-color: #9C27B0; }
        .order-card.status-delivered { border-color: #4CAF50; }
        .order-card.status-cancelled { border-color: #f44336; }
        .order-card.status-returned { border-color: #FF9800; }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-number {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .order-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending { background: #FFF3CD; color: #856404; }
        .status-confirmed { background: #D1ECF1; color: #0C5460; }
        .status-shipped { background: #E1D5E7; color: #4A1B6D; }
        .status-delivered { background: #D4EDDA; color: #155724; }
        .status-cancelled { background: #F8D7DA; color: #721C24; }
        .status-returned { background: #FFF3E0; color: #E65100; }

        .order-details {
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .order-customer {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .order-total {
            color: #ff4444;
            font-size: 16px;
            font-weight: bold;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .status-btn {
            flex: 1;
            min-width: 80px;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .status-btn:active {
            transform: scale(0.95);
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: white;
            font-size: 14px;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 2000;
            display: none;
            animation: slideDown 0.3s ease;
            text-align: center;
            min-width: 280px;
        }

        .notification.success {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .notification.error {
            background: linear-gradient(135deg, #f44336, #da190b);
            color: white;
        }

        @keyframes slideDown {
            from {
                top: -100px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 380px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .quick-actions {
                flex-direction: column;
            }
            
            .action-btn {
                width: 100%;
            }
            
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 5px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- شاشة تسجيل الدخول -->
        <div id="loginScreen" class="login-card">
            <h2><i class="fas fa-store" style="color: #ff4444; margin-left: 10px;"></i>لا كاليتي بالون</h2>
            <p style="text-align: center; color: #666; margin-bottom: 20px;">الأزرق والأحمر</p>
            <input type="text" id="username" class="login-input" placeholder="اسم المستخدم" value="admin">
            <input type="password" id="password" class="login-input" placeholder="كلمة المرور" value="123456">
            <div id="errorMessage" class="error-message"></div>
            <button class="login-btn" id="loginBtn" onclick="login()">
                <span id="loginText">تسجيل الدخول</span>
                <span id="loginLoader" class="loading" style="display: none;"></span>
            </button>
            <p style="text-align: center; margin-top: 15px; color: #999; font-size: 12px;">
                <i class="fas fa-lock" style="margin-left: 5px;"></i>
                بيانات تجريبية: admin / 123456
            </p>
        </div>

        <!-- لوحة التحكم الرئيسية -->
        <div id="dashboard" class="dashboard">
            <!-- شريط التنقل السفلي -->
            <div class="bottom-nav">
                <div class="nav-item active" onclick="showSection('products', this)">
                    <i class="fas fa-box"></i>
                    <span>المنتجات</span>
                </div>
                <div class="nav-item" onclick="showSection('orders', this)">
                    <i class="fas fa-shopping-cart"></i>
                    <span>الطلبات</span>
                </div>
                <div class="nav-item" onclick="showSection('addProduct', this)">
                    <i class="fas fa-plus-circle"></i>
                    <span>إضافة</span>
                </div>
                <div class="nav-item" onclick="showSection('stats', this)">
                    <i class="fas fa-chart-bar"></i>
                    <span>إحصائيات</span>
                </div>
                <div class="nav-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>خروج</span>
                </div>
            </div>

            <div class="content" id="contentArea">
                <!-- سيتم تحميل المحتوى هنا ديناميكياً -->
            </div>

            <div class="footer">
                <p>© 2026 لا كاليتي بالون - جميع الحقوق محفوظة</p>
            </div>
        </div>
    </div>

    <!-- نموذج الإشعارات -->
    <div id="notification" class="notification"></div>

    <script>
        // متغيرات عامة
        let currentSection = 'products';
        let products = [];
        let orders = [];
        
        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', function() {
            console.log('الصفحة تحملت...');
            
            // التحقق من وجود جلسة سابقة
            const loggedIn = localStorage.getItem('sellerLoggedIn');
            console.log('حالة تسجيل الدخول:', loggedIn);
            
            if (loggedIn === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadDashboardData();
                showSection('products', document.querySelector('.nav-item'));
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
            }
            
            // تهيئة بيانات البائع
            initSeller();
        });

        // تهيئة بيانات البائع
        async function initSeller() {
            try {
                const response = await fetch('/api/init-seller');
                const data = await response.json();
                console.log('تهيئة البائع:', data);
            } catch (error) {
                console.error('خطأ في تهيئة البائع:', error);
            }
        }

        // دالة تسجيل الدخول
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginLoader = document.getElementById('loginLoader');
            const errorMessage = document.getElementById('errorMessage');
            
            console.log('محاولة تسجيل الدخول:', { username, password });
            
            // إخفاء أي رسالة خطأ سابقة
            errorMessage.style.display = 'none';
            
            if (!username || !password) {
                errorMessage.textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
                errorMessage.style.display = 'block';
                return;
            }
            
            // تعطيل الزر وإظهار مؤشر التحميل
            loginBtn.disabled = true;
            loginText.style.display = 'none';
            loginLoader.style.display = 'inline-block';
            
            try {
                const response = await fetch('/api/seller/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('استجابة الخادم:', response.status);
                
                const data = await response.json();
                console.log('بيانات الاستجابة:', data);
                
                if (data.success) {
                    // حفظ حالة تسجيل الدخول
                    localStorage.setItem('sellerLoggedIn', 'true');
                    
                    // إخفاء شاشة الدخول وإظهار لوحة التحكم
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    
                    // تحميل البيانات
                    await loadDashboardData();
                    showSection('products', document.querySelector('.nav-item'));
                    
                    showNotification('تم تسجيل الدخول بنجاح', 'success');
                } else {
                    errorMessage.textContent = data.message || 'اسم المستخدم أو كلمة المرور غير صحيحة';
                    errorMessage.style.display = 'block';
                    showNotification(data.message || 'فشل تسجيل الدخول', 'error');
                }
            } catch (error) {
                console.error('خطأ في تسجيل الدخول:', error);
                errorMessage.textContent = 'خطأ في الاتصال بالخادم';
                errorMessage.style.display = 'block';
                showNotification('خطأ في الاتصال بالخادم', 'error');
            } finally {
                // إعادة تمكين الزر
                loginBtn.disabled = false;
                loginText.style.display = 'inline';
                loginLoader.style.display = 'none';
            }
        }

        // دالة تسجيل الخروج
        function logout() {
            localStorage.removeItem('sellerLoggedIn');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
            
            // تنظيف الحقول
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = '123456';
            document.getElementById('errorMessage').style.display = 'none';
            
            showNotification('تم تسجيل الخروج', 'success');
        }

        // تغيير الأقسام
        function showSection(section, element) {
            currentSection = section;
            
            // تحديث النشاط في شريط التنقل
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            if (element) {
                element.classList.add('active');
            }

        // حفظ المنتج مع الصور المتعددة
        async function saveProduct() {
            try {
                const productName = document.getElementById('productName')?.value;
                const basePrice = document.getElementById('basePrice')?.value;
                
                if (!productName || !basePrice) {
                    showNotification('الرجاء إدخال اسم المنتج والسعر الأساسي', 'error');
                    return;
                }
                
                showNotification('جاري حفظ المنتج...', 'success');
                
                const formData = new FormData();
                
                // جمع بيانات المنتج الأساسية
                const productData = {
                    name: productName,
                    description: document.getElementById('productDescription')?.value || '',
                    basePrice: parseFloat(basePrice),
                    colors: [],
                    features: []
                };
                
                // جمع الألوان مع صورها المتعددة
                const colorElements = document.querySelectorAll('[id^="color_"]');
                colorElements.forEach((element, colorIndex) => {
                    const id = element.id.replace('color_', '');
                    const name = document.getElementById(`color_name_${id}`)?.value;
                    const hex = document.getElementById(`color_hex_${id}`)?.value;
                    const stock = document.getElementById(`color_stock_${id}`)?.value;
                    
                    if (name && hex && stock) {
                        productData.colors.push({
                            name,
                            hexCode: hex,
                            stock: parseInt(stock)
                        });
                        
                        // إضافة صور اللون إلى formData
                        const colorImages = document.getElementById(`color_images_${id}`)?.files;
                        if (colorImages) {
                            Array.from(colorImages).forEach((file) => {
                                formData.append('colorImages', file);
                            });
                        }
                    }
                });
                
                // جمع الميزات
                const featureElements = document.querySelectorAll('[id^="feature_"]');
                featureElements.forEach(element => {
                    const id = element.id.replace('feature_', '');
                    const featureName = document.getElementById(`feature_name_${id}`)?.value;
                    
                    if (featureName) {
                        const feature = {
                            name: featureName,
                            options: []
                        };
                        
                        // جمع خيارات الميزة
                        const optionElements = document.querySelectorAll(`#feature_options_${id} [id^="option_"]`);
                        optionElements.forEach(optElement => {
                            const optId = optElement.id.replace('option_', '');
                            const value = document.getElementById(`option_value_${optId}`)?.value;
                            const price = document.getElementById(`option_price_${optId}`)?.value;
                            const stock = document.getElementById(`option_stock_${optId}`)?.value;
                            
                            if (value && price !== undefined && stock) {
                                feature.options.push({
                                    value,
                                    price: parseFloat(price),
                                    stock: parseInt(stock)
                                });
                            }
                        });
                        
                        if (feature.options.length > 0) {
                            productData.features.push(feature);
                        }
                    }
                });
                
                formData.append('productData', JSON.stringify(productData));
                
                // إضافة الصورة الرئيسية
                const mainImage = document.getElementById('mainImage')?.files[0];
                if (mainImage) {
                    formData.append('mainImage', mainImage);
                }
                
                // إضافة الصور الإضافية
                const additionalImages = document.getElementById('additionalImages')?.files;
                if (additionalImages) {
                    Array.from(additionalImages).forEach(file => {
                        formData.append('additionalImages', file);
                    });
                }
                
                const response = await fetch('/api/products', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification('تم حفظ المنتج بنجاح', 'success');
                    await loadDashboardData();
                    showSection('products', document.querySelectorAll('.nav-item')[0]);
                } else {
                    showNotification('خطأ في حفظ المنتج: ' + (data.error || 'unknown'), 'error');
                }
            } catch (error) {
                console.error('خطأ في حفظ المنتج:', error);
                showNotification('حدث خطأ: ' + error.message, 'error');
            }
        }

        // تحديث حالة الطلب
        async function updateOrderStatus(orderId, status, returnReason = null) {
            try {

                if (returnReason) {
                    data.returnReason = returnReason;
                }
                
                const response = await fetch(`/api/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification(`تم تحديث حالة الطلب إلى: ${status}`, 'success');
                    await loadDashboardData();
                    showSection('orders', document.querySelectorAll('.nav-item')[1]);
                } else {
                    showNotification('خطأ في تحديث الحالة', 'error');
                }

                console.error('خطأ في تحديث الحالة:', error);
                showNotification('خطأ في تحديث الحالة', 'error');
            }
        }

        function loadStatsSection() {
            const totalSales = orders.reduce((sum, order) => 
                order.status === 'تم التسليم' ? sum + (order.totalAmount || 0) : sum, 0
            );
            
            const pendingOrders = orders.filter(o => o.status === 'قيد المراجعة').length;
            const deliveredOrders = orders.filter(o => o.status === 'تم التسليم').length;
            const cancelledOrders = orders.filter(o => o.status === 'ملغي').length;
            
            // حساب إجمالي الصور
            const totalImages = products.reduce((sum, product) => {
                let productImages = (product.additionalImages?.length || 0) + 1; // +1 for main image
                const colorImages = product.colors?.reduce((cSum, color) => cSum + (color.images?.length || 0), 0) || 0;
                return sum + productImages + colorImages;
            }, 0);
            
            let html = `
                <div class="header">
                    <h1><i class="fas fa-chart-bar" style="color: #ff4444; margin-left: 10px;"></i>الإحصائيات</h1>
                    <span class="store-name">لا كاليتي بالون</span>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card blue">
                        <i class="fas fa-shopping-cart" style="font-size: 24px; margin-bottom: 5px;"></i>
                        <div class="stat-number">${orders.length}</div>
                        <div class="stat-label">إجمالي الطلبات</div>
                    </div>
                    
                    <div class="stat-card red">
                        <i class="fas fa-check-circle" style="font-size: 24px; margin-bottom: 5px;"></i>
                        <div class="stat-number">${deliveredOrders}</div>
                        <div class="stat-label">مكتملة</div>
                    </div>
                    
                    <div class="stat-card" style="background: linear-gradient(135deg, #FFC107, #FFD54F); color: white;">
                        <i class="fas fa-clock" style="font-size: 24px; margin-bottom: 5px;"></i>
                        <div class="stat-number">${pendingOrders}</div>
                        <div class="stat-label">قيد المراجعة</div>
                    </div>
                    
                    <div class="stat-card" style="background: linear-gradient(135deg, #9C27B0, #BA68C8); color: white;">
                        <i class="fas fa-box" style="font-size: 24px; margin-bottom: 5px;"></i>
                        <div class="stat-number">${products.length}</div>
                        <div class="stat-label">المنتجات</div>
                    </div>

                    <div class="stat-card" style="background: linear-gradient(135deg, #2196F3, #64B5F6); color: white; grid-column: span 2;">
                        <i class="fas fa-images" style="font-size: 24px; margin-bottom: 5px;"></i>
                        <div class="stat-number">${totalImages}</div>
                        <div class="stat-label">إجمالي الصور</div>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-title">
                        <i class="fas fa-chart-line"></i>
                        المبيعات
                    </div>
                    <div style="text-align: center; padding: 20px;">
                        <div style="font-size: 36px; font-weight: bold; color: #ff4444;">
                            ${totalSales.toLocaleString()} د.ج
                        </div>
                        <div style="color: #666; margin-top: 10px;">
                            إجمالي المبيعات (الطلبات المكتملة)
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-title">
                        <i class="fas fa-times-circle"></i>
                        الطلبات الملغية
                    </div>
                    <div style="text-align: center; padding: 20px;">
                        <div style="font-size: 36px; font-weight: bold; color: #f44336;">
                            ${cancelledOrders}
                        </div>
                        <div style="color: #666; margin-top: 10px;">
                            طلب ملغي
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        // دالة تعديل المنتج
        function editProduct(productId) {
            showNotification('سيتم إضافة التعديل قريباً', 'success');
        }

        // دالة إظهار الإشعارات
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="assets/laqualite.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة تحكم البائع المتقدمة - لا كاليتي بالون</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --primary-dark: #3f37c9;
            --secondary: #f72585;
            --success: #4cc9f0;
            --warning: #f8961e;
            --danger: #f94144;
            --dark: #1e1e2f;
            --light: #f8f9fa;
            --gray: #adb5bd;
            --sidebar-width: 280px;
            --header-height: 70px;
        }

        body {
            background: var(--light);
            min-height: 100vh;
        }

        /* Desktop Layout */
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - Desktop */
        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--dark) 0%, #2d2d44 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
            color: white;
        }

        .sidebar-header h2 i {
            color: var(--secondary);
            margin-left: 10px;
        }

        .sidebar-header p {
            color: var(--gray);
            font-size: 14px;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .sidebar-nav-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s;
            margin: 5px 10px;
            border-radius: 12px;
            cursor: pointer;
        }

        .sidebar-nav-item i {
            width: 24px;
            font-size: 20px;
        }

        .sidebar-nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(-5px);
        }

        .sidebar-nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }

        .sidebar-nav-item.logout {
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0;
        }

        .sidebar-nav-item.logout:hover {
            background: var(--danger);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-right: var(--sidebar-width);
            padding: 20px;
            background: #f1f5f9;
            min-height: 100vh;
            transition: all 0.3s;
        }

        /* Top Header */
        .top-header {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .page-title {
            font-size: 24px;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .store-badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Mobile Bottom Navigation */
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 10px 5px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
            z-index: 999;
            border-radius: 30px 30px 0 0;
        }

        .mobile-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--gray);
            font-size: 12px;
            padding: 8px 5px;
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .mobile-nav-item i {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .mobile-nav-item.active {
            color: var(--primary);
            background: rgba(67, 97, 238, 0.1);
        }

        .mobile-nav-item.logout {
            color: var(--danger);
        }

        /* Login Screen */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, #2d2d44 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: var(--dark);
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header h2 i {
            color: var(--primary);
            margin-left: 10px;
        }

        .login-header p {
            color: var(--gray);
        }

        .login-input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
        }

        .error-message {
            color: var(--danger);
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
            background: rgba(249, 65, 68, 0.1);
            padding: 10px;
            border-radius: 10px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-info h3 {
            font-size: 32px;
            font-weight: bold;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .stat-info p {
            color: var(--gray);
            font-size: 14px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .action-btn {
            background: white;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, var(--secondary), #ff4d6d);
            color: white;
        }

        .action-btn.success {
            background: linear-gradient(135deg, #4cc9f0, #4895ef);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* Section Cards */
        .section-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: #f0f0f0;
            color: var(--dark);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: #e0e0e0;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 10px rgba(67, 97, 238, 0.2);
        }

        /* Orders Grid - Desktop */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            border: 1px solid #f0f0f0;
            position: relative;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .order-header {
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa, #f1f5f9);
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-number {
            font-size: 18px;
            font-weight: bold;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-number i {
            color: var(--primary);
        }

        .order-status-badge {
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }

        .order-status-badge.pending { background: #fff3cd; color: #856404; }
        .order-status-badge.confirmed { background: #d1ecf1; color: #0c5460; }
        .order-status-badge.shipped { background: #e1d5e7; color: #4a1b6d; }
        .order-status-badge.delivered { background: #d4edda; color: #155724; }
        .order-status-badge.cancelled { background: #f8d7da; color: #721c24; }
        .order-status-badge.returned { background: #fff3e0; color: #e65100; }
        .order-status-badge.deleted { background: #e0e0e0; color: #424242; }

        .order-body {
            padding: 20px;
        }

        .customer-info {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #f0f0f0;
        }

        .customer-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .customer-details {
            display: flex;
            gap: 15px;
            color: var(--gray);
            font-size: 14px;
            flex-wrap: wrap;
        }

        .customer-details span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .product-list {
            margin: 15px 0;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .order-total {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 15px;
            text-align: left;
        }

        /* Advanced Status Controls */
        .status-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .status-btn {
            padding: 10px 5px;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: white;
            color: var(--dark);
            border: 1px solid #e0e0e0;
        }

        .status-btn i {
            font-size: 16px;
        }

        .status-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        .status-btn.confirm { background: #d1ecf1; color: #0c5460; border-color: #bee5eb; }
        .status-btn.ship { background: #e1d5e7; color: #4a1b6d; border-color: #d4c5e1; }
        .status-btn.deliver { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .status-btn.cancel { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .status-btn.return { background: #fff3e0; color: #e65100; border-color: #ffe0b2; }
        .status-btn.delete { background: #e0e0e0; color: #424242; border-color: #d6d6d6; }
        .status-btn.call { background: #cce5ff; color: #004085; border-color: #b8daff; }
        .status-btn.block { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            height: 200px;
            width: 100%;
            object-fit: cover;
            background: #f0f0f0;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .product-meta {
            display: flex;
            gap: 15px;
            color: var(--gray);
            font-size: 13px;
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .product-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .product-btn.edit {
            background: #cce5ff;
            color: #004085;
        }

        .product-btn.delete {
            background: #f8d7da;
            color: #721c24;
        }

        .product-btn:hover {
            transform: scale(1.05);
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
            font-size: 14px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        /* Image Upload */
        .image-upload-area {
            border: 2px dashed var(--primary);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            background: rgba(67, 97, 238, 0.05);
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-upload-area:hover {
            background: rgba(67, 97, 238, 0.1);
            transform: scale(1.02);
        }

        .image-upload-area i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .multiple-image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .image-preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--primary);
        }

        .preview-image-small {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-image-btn {
            position: absolute;
            top: 3px;
            right: 3px;
            background: var(--danger);
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
        }

        /* Features & Colors */
        .feature-row {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-right: 4px solid var(--primary);
        }

        .color-row {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
        }

        .add-btn {
            background: linear-gradient(135deg, var(--success), #4895ef);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .remove-btn {
            background: var(--danger);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            transform: scale(1.1);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            animation: scaleIn 0.3s ease;
        }

        .modal-title {
            font-size: 24px;
            color: var(--dark);
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-text {
            color: var(--gray);
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn.confirm {
            background: var(--success);
            color: white;
        }

        .modal-btn.cancel {
            background: var(--danger);
            color: white;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 16px 30px;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            z-index: 3000;
            display: none;
            animation: slideDown 0.4s ease;
            text-align: center;
            min-width: 320px;
            font-weight: 600;
        }

        .notification.success {
            background: linear-gradient(135deg, #4cc9f0, #4895ef);
            color: white;
        }

        .notification.error {

    <script>
        // Global Variables
        let currentSection = 'dashboardHome';
        let products = [];
        let orders = [];
        let blockedCustomers = [];
        let currentOrderId = null;
        let currentAction = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ Dashboard loaded');
            
            const loggedIn = localStorage.getItem('sellerLoggedIn');
            
            if (loggedIn === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                loadDashboardData();
                showSection('dashboardHome');
            }
        });

        // Login
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginLoader = document.getElementById('loginLoader');
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.style.display = 'none';
            
            if (!username || !password) {
                errorMessage.textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
                errorMessage.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginText.style.display = 'none';
            loginLoader.style.display = 'inline-block';
            
            try {
                const response = await fetch('/api/seller/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('sellerLoggedIn', 'true');
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    
                    await loadDashboardData();
                    showSection('dashboardHome');
                    
                    showNotification('✅ تم تسجيل الدخول بنجاح', 'success');
                } else {
                    errorMessage.textContent = data.message || 'بيانات الدخول غير صحيحة';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'خطأ في الاتصال بالخادم';
                errorMessage.style.display = 'block';
                showNotification('❌ خطأ في الاتصال', 'error');
            } finally {
                loginBtn.disabled = false;
                loginText.style.display = 'inline';
                loginLoader.style.display = 'none';
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('sellerLoggedIn');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            showNotification('✅ تم تسجيل الخروج', 'success');
        }

        // Show Section - Desktop
        function showSection(section) {
            currentSection = section;
            
            // Update sidebar
            document.querySelectorAll('.sidebar-nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const activeItem = Array.from(document.querySelectorAll('.sidebar-nav-item')).find(
                item => item.textContent.includes(getSectionTitle(section))
            );
            if (activeItem) activeItem.classList.add('active');
            
            // Update page title
            document.getElementById('pageTitle').innerHTML = `
                <i class="${getSectionIcon(section)}"></i>
                <span>${getSectionTitle(section)}</span>
            `;
            
            // Load section content
            loadSectionContent(section);
        }

        // Show Section - Mobile
        function showSectionMobile(section) {
            currentSection = section;
            
            // Update mobile nav
            document.querySelectorAll('.mobile-nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const activeItem = Array.from(document.querySelectorAll('.mobile-nav-item')).find(
                item => item.textContent.includes(getSectionTitle(section))
            );
            if (activeItem) activeItem.classList.add('active');
            
            // Update page title
            document.getElementById('pageTitle').innerHTML = `
                <i class="${getSectionIcon(section)}"></i>
                <span>${getSectionTitle(section)}</span>
            `;
            
            // Load section content
            loadSectionContent(section);
        }

        // Get Section Title
        function getSectionTitle(section) {
            const titles = {
                'dashboardHome': 'الرئيسية',
                'products': 'المنتجات',
                'orders': 'الطلبات',
                'addProduct': 'إضافة منتج',
                'blocked': 'العملاء المحظورون',
                'stats': 'إحصائيات متقدمة'
            };
            return titles[section] || section;
        }

        // Get Section Icon
        function getSectionIcon(section) {
            const icons = {
                'dashboardHome': 'fas fa-chart-pie',
                'products': 'fas fa-box',
                'orders': 'fas fa-shopping-cart',
                'addProduct': 'fas fa-plus-circle',
                'blocked': 'fas fa-ban',
                'stats': 'fas fa-chart-bar'
            };
            return icons[section] || 'fas fa-circle';
        }

        // Load Dashboard Data
        async function loadDashboardData() {
            try {
                showNotification('🔄 جاري تحميل البيانات...', 'success');
                
                const [productsRes, ordersRes, blockedRes] = await Promise.all([
                    fetch('/api/products'),
                    fetch('/api/orders'),
                    fetch('/api/blocked-customers')
                ]);
                
                if (productsRes.ok) products = await productsRes.json();
                if (ordersRes.ok) orders = await ordersRes.json();
                if (blockedRes.ok) blockedCustomers = await blockedRes.json();
                
                console.log('✅ Data loaded:', { products: products.length, orders: orders.length, blocked: blockedCustomers.length });
                
            } catch (error) {
                console.error('❌ Error loading data:', error);
                showNotification('❌ خطأ في تحميل البيانات', 'error');
            }
        }

        // Load Section Content
        function loadSectionContent(section) {
            switch(section) {
                case 'dashboardHome':
                    loadDashboardHome();
                    break;
                case 'products':
                    loadProductsSection();
                    break;
                case 'orders':
                    loadOrdersSection();
                    break;
                case 'addProduct':
                    loadAddProductSection();
                    break;
                case 'blocked':
                    loadBlockedSection();
                    break;
                case 'stats':
                    loadStatsSection();
                    break;
            }
        }

        // Dashboard Home
        function loadDashboardHome() {
            const totalSales = orders.reduce((sum, order) => 
                order.status === 'تم التسليم' ? sum + (order.totalAmount || 0) : sum, 0
            );
            
            const pendingOrders = orders.filter(o => o.status === 'قيد المراجعة').length;
            const confirmedOrders = orders.filter(o => o.status === 'تم التأكيد').length;
            const deliveredOrders = orders.filter(o => o.status === 'تم التسليم').length;
            const cancelledOrders = orders.filter(o => o.status === 'ملغي').length;
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>${orders.length}</h3>
                            <p>إجمالي الطلبات</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #4361ee, #4895ef);">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>${pendingOrders}</h3>
                            <p>قيد المراجعة</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f8961e, #f9844a);">
                            <i class="fas fa-clock"></i>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>${confirmedOrders}</h3>
                            <p>مؤكدة</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #4cc9f0, #4895ef);">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>${deliveredOrders}</h3>
                            <p>مكتملة</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #4cc9f0, #4895ef);">
                            <i class="fas fa-truck"></i>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>${products.length}</h3>
                            <p>المنتجات</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f72585, #ff4d6d);">
                            <i class="fas fa-box"></i>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>${totalSales.toLocaleString()} د.ج</h3>
                            <p>إجمالي المبيعات</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #4cc9f0, #4895ef);">
                            <i class="fas fa-chart-line"></i>
                        </div>
                    </div>
                </div>
                
                <div class="quick-actions">
                    <button class="action-btn primary" onclick="showSection('addProduct')">
                        <i class="fas fa-plus"></i>
                        إضافة منتج جديد
                    </button>
                    <button class="action-btn secondary" onclick="showSection('orders')">
                        <i class="fas fa-eye"></i>
                        عرض الطلبات
                    </button>
                    <button class="action-btn success" onclick="showSection('stats')">
                        <i class="fas fa-chart-bar"></i>
                        الإحصائيات
                    </button>
                </div>
                
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-clock"></i>
                            آخر الطلبات
                        </div>
                        <button class="filter-btn" onclick="showSection('orders')">عرض الكل</button>
                    </div>
                    
                    <div class="orders-grid">
            `;
            
            const recentOrders = orders.slice(0, 4);
            
            if (recentOrders.length === 0) {
                html += '<p style="text-align: center; color: var(--gray);">لا توجد طلبات حديثة</p>';
            } else {
                recentOrders.forEach(order => {
                    const statusClass = {
                        'قيد المراجعة': 'pending',
                        'تم التأكيد': 'confirmed',
                        'تم الشحن': 'shipped',
                        'تم التسليم': 'delivered',
                        'ملغي': 'cancelled',
                        'معاد': 'returned'
                    }[order.status] || 'pending';
                    
                    html += `
                        <div class="order-card">
                            <div class="order-header">
                                <span class="order-number">
                                    <i class="fas fa-hashtag"></i> ${order.orderNumber || 'N/A'}
                                </span>
                                <span class="order-status-badge ${statusClass}">${order.status}</span>
                            </div>
                            
                            <div class="order-body">
                                <div class="customer-info">
                                    <div class="customer-name">
                                        <i class="fas fa-user"></i> ${order.customerInfo?.name || 'بدون اسم'}
                                    </div>
                                    <div class="customer-details">
                                        <span><i class="fas fa-phone"></i> ${order.customerInfo?.phone || 'بدون هاتف'}</span>
                                        <span><i class="fas fa-map-marker-alt"></i> ${order.customerInfo?.wilaya || 'بدون ولاية'}</span>
                                    </div>
                                </div>
                                
                                <div class="order-total">
                                    ${(order.totalAmount || 0).toLocaleString()} د.ج
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += `
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        // Products Section
        function loadProductsSection() {
            let html = `
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-box"></i>
                            قائمة المنتجات
                        </div>
                        <button class="action-btn primary" onclick="showSection('addProduct')" style="padding: 10px 20px;">
                            <i class="fas fa-plus"></i>
                            إضافة منتج
                        </button>
                    </div>
                    
                    <div class="products-grid">
            `;
            
            if (!products || products.length === 0) {
                html += `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                        <i class="fas fa-box-open" style="font-size: 60px; color: var(--gray); margin-bottom: 20px;"></i>
                        <p style="color: var(--gray);">لا توجد منتجات</p>
                        <button class="action-btn primary" style="margin-top: 20px;" onclick="showSection('addProduct')">
                            <i class="fas fa-plus"></i>
                            إضافة منتج
                        </button>
                    </div>
                `;
            } else {
                products.forEach(product => {
                    html += `
                        <div class="product-card">
                            <img src="/uploads/${product.mainImage || 'default.jpg'}" class="product-image" onerror="this.src='https://via.placeholder.com/300x200?text=لا+توجد+صورة'">
                            <div class="product-info">
                                <div class="product-name">${product.name || 'بدون اسم'}</div>
                                <div class="product-price">${(product.basePrice || 0).toLocaleString()} د.ج</div>
                                <div class="product-meta">
                                    <span><i class="fas fa-palette" style="color: var(--primary);"></i> ${product.colors?.length || 0} لون</span>
                                    <span><i class="fas fa-images" style="color: var(--secondary);"></i> ${(product.additionalImages?.length || 0) + (product.colors?.reduce((sum, c) => sum + (c.images?.length || 0), 0) || 0)} صورة</span>
                                </div>
                                <div class="product-actions">
                                    <button class="product-btn edit" onclick="editProduct('${product._id}')">
                                        <i class="fas fa-edit"></i> تعديل
                                    </button>
                                    <button class="product-btn delete" onclick="deleteProduct('${product._id}')">
                                        <i class="fas fa-trash"></i> حذف
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += `
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        // Orders Section with Advanced Status Controls
        function loadOrdersSection(filter = 'الكل') {
            let html = `
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-shopping-cart"></i>
                            إدارة الطلبات
                        </div>
                    </div>
                    
                    <div class="filter-bar">
                        <button class="filter-btn ${filter === 'الكل' ? 'active' : ''}" onclick="filterOrders('الكل')">الكل</button>
                        <button class="filter-btn ${filter === 'قيد المراجعة' ? 'active' : ''}" onclick="filterOrders('قيد المراجعة')">قيد المراجعة</button>
                        <button class="filter-btn ${filter === 'تم التأكيد' ? 'active' : ''}" onclick="filterOrders('تم التأكيد')">مؤكدة</button>
                        <button class="filter-btn ${filter === 'تم الشحن' ? 'active' : ''}" onclick="filterOrders('تم الشحن')">تم الشحن</button>
                        <button class="filter-btn ${filter === 'تم التسليم' ? 'active' : ''}" onclick="filterOrders('تم التسليم')">تم التسليم</button>
                        <button class="filter-btn ${filter === 'ملغي' ? 'active' : ''}" onclick="filterOrders('ملغي')">ملغية</button>
                        <button class="filter-btn ${filter === 'معاد' ? 'active' : ''}" onclick="filterOrders('معاد')">معادة</button>

        // Remove Field
        function removeField(elementId) {
            const element = document.getElementById(elementId);

                element.remove();

        // Preview Image
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 100%; max-height: 200px; border-radius: 10px;">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Preview Multiple Images
        function previewMultipleImages(input, previewId) {
            const preview = document.getElementById(previewId);
            preview.innerHTML = '';
            
            if (input.files) {
                Array.from(input.files).forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const imgDiv = document.createElement('div');
                        imgDiv.className = 'image-preview-item';
                        imgDiv.innerHTML = `
                            <img src="${e.target.result}" class="preview-image-small">
                            <button type="button" class="remove-image-btn" onclick="this.parentElement.remove()">
                                <i class="fas fa-times"></i>
                            </button>
                        `;
                        preview.appendChild(imgDiv);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }

        // Save Product
        async function saveProduct() {
            try {
                const productName = document.getElementById('productName')?.value;
                const basePrice = document.getElementById('basePrice')?.value;
                
                if (!productName || !basePrice) {
                    showNotification('⚠️ الرجاء إدخال اسم المنتج والسعر الأساسي', 'error');
                    return;
                }
                
                showNotification('🔄 جاري حفظ المنتج...', 'success');
                
                const formData = new FormData();
                
                const productData = {
                    name: productName,
                    description: document.getElementById('productDescription')?.value || '',
                    basePrice: parseFloat(basePrice),
                    colors: [],
                    features: []
                };
                
                // Collect colors
                const colorElements = document.querySelectorAll('[id^="color_"]');
                colorElements.forEach((element) => {
                    const id = element.id.replace('color_', '');
                    const name = document.getElementById(`color_name_${id}`)?.value;
                    const hex = document.getElementById(`color_hex_${id}`)?.value;
                    const stock = document.getElementById(`color_stock_${id}`)?.value;
                    
                    if (name && hex && stock) {
                        productData.colors.push({
                            name,
                            hexCode: hex,
                            stock: parseInt(stock)
                        });
                    }
                });
                
                // Collect features
                const featureElements = document.querySelectorAll('[id^="feature_"]');
                featureElements.forEach(element => {
                    const id = element.id.replace('feature_', '');
                    const featureName = document.getElementById(`feature_name_${id}`)?.value;
                    
                    if (featureName) {
                        const feature = {
                            name: featureName,
                            options: []
                        };
                        
                        const optionElements = document.querySelectorAll(`#feature_options_${id} [id^="option_"]`);
                        optionElements.forEach(optElement => {
                            const optId = optElement.id.replace('option_', '');
                            const value = document.getElementById(`option_value_${optId}`)?.value;
                            const price = document.getElementById(`option_price_${optId}`)?.value;
                            const stock = document.getElementById(`option_stock_${optId}`)?.value;
                            
                            if (value && price !== undefined && stock) {
                                feature.options.push({
                                    value,
                                    price: parseFloat(price),
                                    stock: parseInt(stock)
                                });
                            }
                        });
                        
                        if (feature.options.length > 0) {
                            productData.features.push(feature);
                        }
                    }
                });
                
                formData.append('productData', JSON.stringify(productData));
                
                const mainImage = document.getElementById('mainImage')?.files[0];
                if (mainImage) {
                    formData.append('mainImage', mainImage);
                }
                
                const additionalImages = document.getElementById('additionalImages')?.files;
                if (additionalImages) {
                    Array.from(additionalImages).forEach(file => {
                        formData.append('additionalImages', file);
                    });
                }
                
                const response = await fetch('/api/products', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification('✅ تم حفظ المنتج بنجاح', 'success');
                    await loadDashboardData();
                    showSection('products');
                } else {
                    showNotification('❌ خطأ: ' + (data.error || 'unknown'), 'error');
                }
            } catch (error) {
                console.error('❌ Error:', error);
                showNotification('❌ حدث خطأ: ' + error.message, 'error');
            }
        }

        // Edit Product
        function editProduct(productId) {

        // Filter Orders
        function filterOrders(filter) {

        // Update Order Status
        async function updateOrderStatus(orderId, status, returnReason = null) {
            try {
                const data = { status };
                if (returnReason) {
                    data.returnReason = returnReason;
                }
                
                const response = await fetch(`/api/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification(`✅ تم تحديث الحالة إلى: ${status}`, 'success');
                    await loadDashboardData();
                    loadOrdersSection();
                } else {
                    showNotification('❌ خطأ في تحديث الحالة', 'error');
                }
            } catch (error) {
                showNotification('❌ خطأ في الاتصال', 'error');
            }
        }

        // Show Return Modal
        function showReturnModal(orderId) {
            currentOrderId = orderId;
            document.getElementById('returnModal').style.display = 'flex';
        }

        // Close Return Modal
        function closeReturnModal() {
            document.getElementById('returnModal').style.display = 'none';
            document.getElementById('returnReason').value = '';
        }

        // Submit Return Reason
        function submitReturnReason() {
            const reason = document.getElementById('returnReason').value.trim();
            if (!reason) {
                showNotification('⚠️ الرجاء إدخال سبب الإعادة', 'error');
                return;
            }
            
            closeReturnModal();
            updateOrderStatus(currentOrderId, 'معاد', reason);
        }

        // Call Customer
        function callCustomer(phone) {
            showConfirmModal(
                '📞 تأكيد الاتصال',

                () => {

        }

        // Block Customer
        function blockCustomer(phone, name) {
            const reason = prompt('الرجاء إدخال سبب الحظر:');
            if (!reason) return;
            
            showConfirmModal(
                '🚫 تأكيد الحظر',
                `هل أنت متأكد من حظر الرقم ${phone}؟`,
                async () => {
                    try {
                        const response = await fetch('/api/block-customer', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone, name, reason })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            showNotification('🚫 تم حظر العميل بنجاح', 'success');
                            await loadDashboardData();
                        } else {
                            showNotification('❌ خطأ في الحظر', 'error');
                        }

                    }
                }
            );
        }

        // Show Confirm Modal
        function showConfirmModal(title, text, onConfirm) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            
            document.getElementById('modalConfirm').onclick = () => {
                modal.style.display = 'none';
                onConfirm();
            };
            
            document.getElementById('modalCancel').onclick = () => {
                modal.style.display = 'none';
            };
            
            modal.style.display = 'flex';
        }

        // Show Notification
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
    </script>

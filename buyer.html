<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>La Qualité Balloon | لا كاليتي بالون</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/laqualite.png">
    <!-- Animation Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    
    <style>
        /* ========== DESIGN SYSTEM ========== */
        :root {
            --primary-deep-blue: #0B2A4A;
            --primary-rich-gold: #C6A13B;
            --primary-soft-red: #DC4C4C;
            --accent-teal: #2A9D8F;
            --accent-cream: #FAF3E0;
            
            /* Neutrals */
            --bg-light: #F8FAFC;
            --bg-white: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #475569;
            --text-muted: #64748B;
            --border-light: #E2E8F0;
            --border-medium: #CBD5E1;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, var(--primary-deep-blue) 0%, #1A3F5C 100%);
            --gradient-gold: linear-gradient(135deg, var(--primary-rich-gold) 0%, #E5B344 100%);
            --gradient-red: linear-gradient(135deg, var(--primary-soft-red) 0%, #E86A6A 100%);
            
            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 30px rgba(11, 42, 74, 0.12);
            --shadow-xl: 0 20px 40px rgba(11, 42, 74, 0.15);
            
            /* Border Radius */
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            
            /* Transitions */
            --transition-fast: 0.2s ease;
            --transition-base: 0.3s ease;
            --transition-slow: 0.5s ease;
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-light);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-deep-blue);
            border-radius: var(--radius-full);
            border: 2px solid var(--bg-light);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-rich-gold);
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(198, 161, 59, 0.15);
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .store-title {
            font-size: 24px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .arabic-text {
            color: var(--primary-deep-blue);
            position: relative;
        }

        .french-text {
            color: var(--primary-soft-red);
            font-weight: 700;
            font-size: 16px;
        }

        .back-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            color: var(--primary-deep-blue);
            transition: all var(--transition-base);
        }

        .back-button:hover {
            background: var(--primary-deep-blue);
            color: white;
            transform: translateX(5px);
        }

        /* ========== SEARCH BAR ========== */
        .search-container {
            padding: 15px 20px;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar {
            background: var(--bg-white);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .search-input {
            flex: 1;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            outline: none;
            background: transparent;
        }

        .search-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .search-btn:hover {
            background: var(--gradient-gold);
        }

        /* ========== CATEGORIES ========== */
        .categories-section {
            padding: 10px 20px;
        }

        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0 15px;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background: var(--bg-white);
            padding: 8px 20px;
            border-radius: var(--radius-full);
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all var(--transition-base);
            font-weight: 600;
        }

        .category-item.active {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--primary-deep-blue);
        }

        /* ========== PRODUCTS GRID ========== */
        .content {
            padding: 0 20px 90px 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .product-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all var(--transition-bounce);
            position: relative;
            text-decoration: none;
            color: inherit;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .product-image-wrapper {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .favorite-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-soft-red);
            font-size: 18px;
            transition: all var(--transition-base);
        }

        .favorite-btn.active {
            background: var(--primary-soft-red);
            color: white;
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--gradient-red);
            color: white;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 700;
            z-index: 2;
        }

        .product-info {
            padding: 12px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 40px;
        }

        .price-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .current-price {
            color: var(--primary-soft-red);
            font-size: 16px;
            font-weight: 800;
        }

        .original-price {
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* ========== PRODUCT DETAIL ========== */
        .product-detail {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid var(--border-light);
        }

        .detail-gallery {
            padding: 15px;
        }

        .main-image-container {
            border-radius: var(--radius-md);
            overflow: hidden;
            aspect-ratio: 1 / 1;
            margin-bottom: 10px;
        }

        .detail-main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-images {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .thumbnail {
            width: 70px;
            height: 70px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--transition-base);
        }

        .thumbnail.active {
            border-color: var(--primary-rich-gold);
        }

        .detail-info {
            padding: 20px;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary-deep-blue);
            margin-bottom: 10px;
        }

        .detail-price {
            font-size: 28px;
            color: var(--primary-soft-red);
            font-weight: 900;
            margin-bottom: 15px;
        }

        .detail-description {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-light);
            border-radius: var(--radius-md);
        }

        .options-section {
            margin-bottom: 20px;
        }

        .options-title {
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--border-light);
            transition: all var(--transition-base);
        }

        .color-option.selected {
            border-color: var(--primary-rich-gold);
            transform: scale(1.1);
        }

        .color-option.out-of-stock {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .feature-values {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .feature-value {
            background: var(--bg-light);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: all var(--transition-base);
            font-size: 14px;
        }

        .feature-value.selected {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--primary-deep-blue);
        }

        .feature-value.out-of-stock {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .quantity-selector {
            display: inline-flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: var(--radius-full);
            padding: 5px;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .quantity-btn:hover:not(:disabled) {
            background: var(--gradient-primary);
            color: white;
        }

        .quantity-input {
            width: 50px;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: 700;
            font-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: var(--radius-full);
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient-red);
            color: white;
        }

        .btn-secondary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-deep-blue);
            color: var(--primary-deep-blue);
        }

        .btn-sm {
            padding: 10px 20px;
            font-size: 14px;
        }

        /* ========== CART SECTION ========== */
        .section-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary-deep-blue);
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cart-item {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 15px;
            display: flex;
            gap: 15px;
            border: 1px solid var(--border-light);
            position: relative;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-sm);
            object-fit: cover;
        }

        .cart-item-content {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .cart-item-features {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-light);
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            display: inline-block;
            margin: 5px 0;
        }

        .cart-item-price {
            color: var(--primary-soft-red);
            font-weight: 800;
        }

        .cart-item-remove {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #fee2e2;
            color: var(--primary-soft-red);
            border: none;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .cart-item-remove:hover {
            background: var(--primary-soft-red);
            color: white;
        }

        /* ========== FAVORITES SECTION ========== */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .favorite-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border-light);
            position: relative;
        }

        .favorite-card .remove-favorite {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--primary-soft-red);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        /* ========== ORDERS SECTION ========== */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .order-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 15px;
            border: 1px solid var(--border-light);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
        }

        .order-number {
            font-weight: 900;
            color: var(--primary-deep-blue);
            direction: ltr;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 700;
        }

        .status-pending {
            background: #FFF3E0;
            color: #E65100;
        }

        .status-confirmed {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .status-shipped {
            background: #E3F2FD;
            color: #1565C0;
        }

        .status-delivered {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .status-cancelled {
            background: #FFEBEE;
            color: #C62828;
        }

        .order-products {
            margin: 10px 0;
            font-size: 14px;
        }

        .order-total {
            font-weight: 800;
            color: var(--primary-soft-red);
            margin-top: 10px;
            text-align: left;
        }

        /* ========== DELIVERY FORM ========== */
        .form-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
        }

        .form-title {
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-deep-blue);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-input,
        .wilaya-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 15px;
            transition: all var(--transition-base);
            outline: none;
        }

        .form-input:focus,
        .wilaya-select:focus {
            border-color: var(--primary-rich-gold);
        }

        .delivery-options {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .delivery-option {
            flex: 1;
            background: var(--bg-light);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .delivery-option.selected {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--primary-deep-blue);
        }

        .order-summary {
            background: var(--gradient-primary);
            color: white;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed rgba(255,255,255,0.3);
            font-weight: 800;
            font-size: 20px;
        }

        /* ========== TRACKING SECTION ========== */
        .tracking-container {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 25px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .track-input-wrapper {
            max-width: 300px;
            margin: 20px auto;
        }

        .track-input {
            width: 100%;
            padding: 15px;
            border: 3px dashed var(--border-medium);
            border-radius: var(--radius-full);
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            outline: none;
            direction: ltr;
        }

        .status-timeline {
            margin: 30px 0;
            position: relative;
        }

        .status-step {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
            padding-right: 30px;
        }

        .status-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-light);
            border: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            position: absolute;
            right: -10px;
        }

        .status-icon.completed {
            background: var(--accent-teal);
            border-color: var(--accent-teal);
            color: white;
        }

        .status-icon.active {
            border-color: var(--primary-rich-gold);
            color: var(--primary-rich-gold);
            animation: pulse 1.5s infinite;
        }

        .status-content {
            text-align: right;
            margin-right: 50px;
        }

        .status-title {
            font-weight: 700;
        }

        /* ========== BOTTOM NAVIGATION ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            border-top: 1px solid rgba(198, 161, 59, 0.15);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            padding: 5px 10px;
            transition: all var(--transition-base);
            position: relative;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 3px;
        }

        .nav-item.active {
            color: var(--primary-deep-blue);
        }

        .nav-item.active i {
            color: var(--primary-rich-gold);
        }

        .badge {
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gradient-red);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        /* ========== NOTIFICATION ========== */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            z-index: 2000;
            transition: transform var(--transition-base);
            text-align: center;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification.success {
            background: var(--accent-teal);
        }

        .notification.error {
            background: var(--gradient-red);
        }

        /* ========== EMPTY STATES ========== */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 60px;
            color: var(--border-medium);
            margin-bottom: 15px;
        }

        /* ========== LOADING ========== */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-light);
            border-top-color: var(--primary-rich-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .detail-title {
                font-size: 20px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>

                        ${feature.options.map((option, oIndex) => `
                                <div class="feature-value ${oIndex === 0 ? 'selected' : ''}" 
                                     onclick="selectFeature(${fIndex}, ${option.price}, this)">
                                    ${option.value}${option.price > 0 ? ` (+${option.price} د.ج)` : ''}

        function changeMainImage(src) {
            document.getElementById('mainProductImage').src = src;
            document.querySelectorAll('.thumbnail').forEach(thumb => {
                thumb.classList.remove('active');
                if (thumb.src === src) thumb.classList.add('active');
            });

        function selectColor(hex, element) {
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            window.selectedColor = currentProduct.colors.find(c => c.hexCode === hex);
        }

        function selectFeature(index, price, element) {
            document.querySelectorAll(`.feature-values`).forEach(section => {
                section.querySelectorAll('.feature-value').forEach(el => el.classList.remove('selected'));
            });
            element.classList.add('selected');
            
            window.selectedFeatures[index] = { price };
            updatePrice();
        }

        function updatePrice() {
            let additional = window.selectedFeatures.reduce((sum, f) => sum + (f?.price || 0), 0);
            const total = currentProduct.basePrice + additional;
            document.getElementById('dynamicPrice').innerHTML = total.toLocaleString() + ' د.ج';
        }

        function changeQuantity(delta) {
            const input = document.getElementById('quantity');
            let value = parseInt(input.value) + delta;
            if (value >= 1 && value <= 99) {
                input.value = value;
            }
        }

        function addToCart() {
            const quantity = parseInt(document.getElementById('quantity').value);
            
            const cartItem = {
                productId: currentProduct._id,
                name: currentProduct.name,
                basePrice: currentProduct.basePrice,
                selectedColor: window.selectedColor?.name || null,
                quantity: quantity,
                totalPrice: calculateItemPrice() * quantity,
                image: currentProduct.mainImage
            };
            
            cart.push(cartItem);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateBadges();
            showNotification('تمت الإضافة إلى السلة');
        }

        function calculateItemPrice() {
            let additional = window.selectedFeatures.reduce((sum, f) => sum + (f?.price || 0), 0);
            return currentProduct.basePrice + additional;
        }

        function buyNow() {
            addToCart();
            setTimeout(() => showCartSection(), 500);
        }

        // ========== FAVORITES ==========
        function toggleFavorite(event, productId) {
            event.stopPropagation();
            
            const product = products.find(p => p._id === productId);
            if (!product) return;
            
            const index = favorites.findIndex(f => f._id === productId);
            
            if (index === -1) {
                favorites.push(product);
                showNotification('تمت الإضافة إلى المفضلة');
            } else {
                favorites.splice(index, 1);
                showNotification('تمت الإزالة من المفضلة');
            }
            
            localStorage.setItem('favorites', JSON.stringify(favorites));
            updateBadges();
            
            // Update button if visible
            const btn = event.currentTarget;
            if (btn) {
                btn.classList.toggle('active');
                if (btn.querySelector('span')) {
                    btn.innerHTML = btn.classList.contains('active') ? 
                        '<i class="fas fa-heart"></i> إزالة من المفضلة' : 
                        '<i class="fas fa-heart"></i> أضف إلى المفضلة';

            }
        }

                                <div class="current-price">${product.basePrice.toLocaleString()} د.ج</div>

                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `;
                });

                html += `</div>`;
                document.getElementById('contentArea').innerHTML = html;
            }
            
            document.getElementById('backButton').style.display = 'flex';
            updateActiveNav('favorites');
        }

        // ========== CART SECTION ==========
        function showCartSection() {
            if (cart.length === 0) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-bag"></i>
                        <h3>السلة فارغة</h3>
                        <p>أضف منتجات إلى السلة للبدء</p>
                        <button class="btn btn-primary" onclick="showHomeSection()" style="margin-top: 20px;">
                            تسوق الآن
                        </button>
                    </div>
                `;
            } else {
                let html = `
                    <h2 class="section-title">
                        <i class="fas fa-shopping-bag" style="color: var(--primary-rich-gold);"></i>
                        سلة المشتريات
                    </h2>
                    
                    <div class="cart-items">
                `;

                cart.forEach((item, index) => {
                    html += `
                        <div class="cart-item">
                            <img src="/uploads/${item.image || 'default.jpg'}" class="cart-item-image" onerror="this.src='https://via.placeholder.com/80'">
                            <div class="cart-item-content">
                                <div class="cart-item-name">${item.name}</div>
                                ${item.selectedColor ? `<div class="cart-item-features">اللون: ${item.selectedColor}</div>` : ''}
                                <div class="cart-item-price">${item.totalPrice.toLocaleString()} د.ج</div>
                                <div>الكمية: ${item.quantity}</div>
                            </div>
                            <button class="cart-item-remove" onclick="removeFromCart(${index})">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    `;
                });

                const subtotal = cart.reduce((sum, item) => sum + item.totalPrice, 0);

                html += `
                    </div>

                    <div class="form-card">
                        <div class="form-title">
                            <i class="fas fa-truck"></i>
                            معلومات التوصيل
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">الولاية</label>
                            <select class="wilaya-select" id="wilayaSelect" onchange="calculateDelivery()">
                                <option value="">-- اختر الولاية --</option>
                `;

                wilayas.forEach(w => {
                    html += `<option value="${w.code}">${w.code} - ${w.name}</option>`;
                });

                html += `
                            </select>
                        </div>
                        
                        <div class="delivery-options">
                            <div class="delivery-option selected" onclick="selectDeliveryType('normal', this)">
                                <i class="fas fa-box"></i> عادي
                                <small>3-5 أيام</small>
                            </div>
                            <div class="delivery-option" onclick="selectDeliveryType('fast', this)">
                                <i class="fas fa-shipping-fast"></i> سريع
                                <small>1-2 يوم</small>
                            </div>
                        </div>
                        
                        <div style="text-align: center; margin: 10px 0;" id="deliveryMessage">
                            اختر الولاية لحساب التكلفة
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-title">
                            <i class="fas fa-user"></i>
                            معلوماتك الشخصية
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">الاسم الكامل</label>
                            <input type="text" class="form-input" id="customerName" placeholder="الاسم">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="tel" class="form-input" id="customerPhone" placeholder="05XX XX XX XX" dir="ltr">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">العنوان</label>
                            <textarea class="form-input" id="customerAddress" placeholder="العنوان بالتفصيل" rows="3"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">ملاحظات (اختياري)</label>
                            <textarea class="form-input" id="customerNotes" placeholder="ملاحظات إضافية" rows="2"></textarea>
                        </div>
                    </div>

                    <div class="order-summary">
                        <div class="summary-row">
                            <span>المجموع:</span>
                            <span>${subtotal.toLocaleString()} د.ج</span>
                        </div>
                        <div class="summary-row">
                            <span>التوصيل:</span>
                            <span id="deliveryCostDisplay">0 د.ج</span>
                        </div>
                        <div class="summary-total">
                            <span>الإجمالي:</span>
                            <span id="totalDisplay">${subtotal.toLocaleString()} د.ج</span>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="placeOrder()" style="width: 100%;">
                        <i class="fas fa-check"></i> تأكيد الطلب
                    </button>
                `;

                document.getElementById('contentArea').innerHTML = html;
            }
            
            document.getElementById('backButton').style.display = 'flex';
            updateActiveNav('cart');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateBadges();
            showCartSection();
            showNotification('تمت الإزالة من السلة');
        }

        function selectDeliveryType(type, element) {
            document.querySelectorAll('.delivery-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            deliveryType = type;
            calculateDelivery();
        }

        function calculateDelivery() {
            const select = document.getElementById('wilayaSelect');
            const code = select.value;
            
            if (!code) {
                document.getElementById('deliveryMessage').innerHTML = 'الرجاء اختيار الولاية';
                return;
            }

            const wilaya = wilayas.find(w => w.code === code);
            
            if (wilaya) {
                deliveryCost = deliveryType === 'fast' ? wilaya.deliveryFast : wilaya.deliveryNormal;
                
                document.getElementById('deliveryMessage').innerHTML = `
                    <i class="fas fa-check-circle" style="color: var(--accent-teal);"></i>
                    التوصيل إلى ${wilaya.name}: ${deliveryCost.toLocaleString()} د.ج
                `;
                
                document.getElementById('deliveryCostDisplay').textContent = deliveryCost.toLocaleString() + ' د.ج';
                
                const subtotal = cart.reduce((sum, item) => sum + item.totalPrice, 0);
                document.getElementById('totalDisplay').textContent = (subtotal + deliveryCost).toLocaleString() + ' د.ج';
            }
        }

        function placeOrder() {
    const name = document.getElementById('customerName')?.value.trim();
    const phone = document.getElementById('customerPhone')?.value.trim();
    const address = document.getElementById('customerAddress')?.value.trim();
    const notes = document.getElementById('customerNotes')?.value.trim();
    const wilayaSelect = document.getElementById('wilayaSelect');
    const wilayaCode = wilayaSelect?.value;

    if (!name || !phone || !address || !wilayaCode) {
        showNotification('الرجاء إكمال جميع المعلومات', 'error');
        return;
    }

    if (!/^(05|06|07)[0-9]{8}$/.test(phone)) {
        showNotification('رقم الهاتف غير صحيح', 'error');
        return;
    }

    if (deliveryCost === 0) {
        showNotification('الرجاء اختيار الولاية', 'error');
        return;
    }

    const wilaya = wilayas.find(w => w.code === wilayaCode);
    const subtotal = cart.reduce((sum, item) => sum + item.totalPrice, 0);
    const total = subtotal + deliveryCost;

    // Create order object
    const order = {
        products: cart.map(item => ({
            productId: item.productId,
            name: item.name,
            selectedFeatures: item.selectedFeatures || [],
            selectedColor: item.selectedColor || null,
            quantity: item.quantity,
            priceAtTime: item.totalPrice / item.quantity
        })),
        customerInfo: {
            name,
            phone,
            address,
            wilaya: wilaya.name
        },
        deliveryCost,
        totalAmount: total,
        notes: notes || ''
    };

    // Send to server
    fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Save order to localStorage as backup
            const savedOrder = {
                ...order,
                orderNumber: data.orderNumber,
                date: new Date().toISOString(),
                status: 'قيد المراجعة'
            };
            orders.push(savedOrder);
            localStorage.setItem('orders', JSON.stringify(orders));

            // Clear cart
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateBadges();

            // Show success
            showOrderSuccess(data.orderNumber);
        } else {
            throw new Error(data.message || 'فشل إنشاء الطلب');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showNotification('حدث خطأ في إنشاء الطلب', 'error');
    });
}
        function showOrderSuccess(orderNumber) {
            document.getElementById('contentArea').innerHTML = `
                <div class="empty-state">
                    <div style="width: 80px; height: 80px; background: var(--accent-teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                        <i class="fas fa-check" style="color: white; font-size: 40px;"></i>
                    </div>
                    <h3>تم استلام طلبك بنجاح!</h3>
                    <p style="margin: 20px 0;">رقم التتبع: <strong style="direction: ltr; font-size: 24px;">${orderNumber}</strong></p>
                    <p>يمكنك تتبع طلبك باستخدام هذا الرقم</p>
                    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 30px;">
                        <button class="btn btn-secondary" onclick="showOrdersSection()">
                            <i class="fas fa-box"></i> طلباتي
                        </button>
                        <button class="btn btn-primary" onclick="showHomeSection()">
                            <i class="fas fa-home"></i> الرئيسية
                        </button>
                    </div>
                </div>
            `;
        }

        // ========== ORDERS SECTION ==========
        function showOrdersSection() {
            if (orders.length === 0) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>لا توجد طلبات سابقة</h3>
                        <p>قم بتسوق منتجاتنا المميزة</p>
                        <button class="btn btn-primary" onclick="showHomeSection()" style="margin-top: 20px;">
                            تسوق الآن
                        </button>
                    </div>
                `;
            } else {
                let html = `
                    <h2 class="section-title">
                        <i class="fas fa-box"></i>
                        طلباتي
                    </h2>
                    <div class="orders-list">
                `;

                orders.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(order => {
                    const statusClass = {
                        'قيد المراجعة': 'status-pending',
                        'تم التأكيد': 'status-confirmed',
                        'تم الشحن': 'status-shipped',
                        'تم التسليم': 'status-delivered',
                        'ملغي': 'status-cancelled'
                    }[order.status] || 'status-pending';

                    html += `
                        <div class="order-card">
                            <div class="order-header">
                                <span class="order-number">#${order.orderNumber}</span>
                                <span class="order-status ${statusClass}">${order.status}</span>
                            </div>
                            <div class="order-products">
                                ${order.products.map(p => `${p.quantity}x ${p.name}`).join(' • ')}
                            </div>
                            <div class="order-total">${order.total.toLocaleString()} د.ج</div>
                            <div style="font-size: 12px; color: var(--text-muted); margin-top: 10px;">
                                ${new Date(order.date).toLocaleDateString('ar-DZ')}
                            </div>
                            <button class="btn btn-outline btn-sm" onclick="trackOrderNumber('${order.orderNumber}')" style="width: 100%; margin-top: 10px;">
                                <i class="fas fa-map-marker-alt"></i> تتبع الطلب
                            </button>
                        </div>
                    `;
                });

                html += `</div>`;
                document.getElementById('contentArea').innerHTML = html;
            }
            
            document.getElementById('backButton').style.display = 'flex';
            updateActiveNav('orders');
        }

        // ========== TRACKING SECTION ==========
        function showTrackSection() {
            document.getElementById('contentArea').innerHTML = `
                <div class="tracking-container" data-aos="fade-up">
                    <i class="fas fa-search" style="font-size: 50px; color: var(--border-medium); margin-bottom: 20px;"></i>
                    <h3>تتبع طلبك</h3>
                    <p style="color: var(--text-muted); margin: 10px 0 20px;">أدخل رقم التتبع المكون من 6 أرقام</p>
                    
                    <div class="track-input-wrapper">
                        <input type="text" class="track-input" id="trackNumber" maxlength="6" placeholder="------" dir="ltr">
                    </div>
                    
                    <button class="btn btn-primary" onclick="trackOrder()" style="width: 100%;">
                        <i class="fas fa-search"></i> تتبع
                    </button>
                </div>
                <div id="trackResult"></div>
            `;
            
            document.getElementById('backButton').style.display = 'flex';
            updateActiveNav('track');
            
            setTimeout(() => document.getElementById('trackNumber')?.focus(), 500);
        }

        function trackOrder() {
            const number = document.getElementById('trackNumber').value.trim();
            
            if (!number || number.length !== 6) {
                showNotification('الرجاء إدخال رقم صحيح', 'error');
                return;
            }

            trackOrderNumber(number);
        }

        function trackOrderNumber(orderNumber) {
            const order = orders.find(o => o.orderNumber === orderNumber);
            
            if (!order) {
                document.getElementById('trackResult').innerHTML = `
                    <div style="background: #fee2e2; padding: 30px; border-radius: var(--radius-md); text-align: center; margin-top: 20px;">
                        <i class="fas fa-exclamation-circle" style="color: var(--primary-soft-red); font-size: 40px; margin-bottom: 10px;"></i>
                        <h3 style="color: var(--primary-soft-red);">لم يتم العثور على الطلب</h3>
                        <p style="margin-top: 10px;">تأكد من الرقم وحاول مرة أخرى</p>
                    </div>
                `;
                return;
            }

            const statuses = ['قيد المراجعة', 'تم التأكيد', 'تم الشحن', 'تم التسليم'];
            const currentIndex = statuses.indexOf(order.status);
            
            let timelineHtml = `
                <div class="tracking-container" style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>طلب #${order.orderNumber}</h3>
                        <span class="order-status ${order.status === 'تم التسليم' ? 'status-delivered' : 'status-pending'}">${order.status}</span>
                    </div>
                    
                    <div class="status-timeline">
            `;

            statuses.forEach((status, index) => {
                const statusClass = index < currentIndex ? 'completed' : index === currentIndex ? 'active' : '';
                const icon = index < currentIndex ? 'fa-check' : 
                            index === 0 ? 'fa-clipboard-list' :
                            index === 1 ? 'fa-check-circle' :
                            index === 2 ? 'fa-truck' : 'fa-home';
                
                timelineHtml += `
                    <div class="status-step">
                        <div class="status-icon ${statusClass}">
                            <i class="fas ${icon}"></i>
                        </div>
                        <div class="status-content">
                            <div class="status-title">${status}</div>
                            <div class="status-date">
                                ${index === currentIndex ? 'الحالي' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            timelineHtml += `
                    </div>
                    
                    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-light);">
                        <h4>تفاصيل الطلب</h4>
                        <div style="margin-top: 15px;">
                            ${order.products.map(p => `
                                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                    <span>${p.name} ×${p.quantity}</span>
                                    <span>${p.totalPrice.toLocaleString()} د.ج</span>
                                </div>
                            `).join('')}
                            <hr style="margin: 10px 0;">
                            <div style="display: flex; justify-content: space-between;">
                                <span>المجموع:</span>
                                <span>${order.total.toLocaleString()} د.ج</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('trackResult').innerHTML = timelineHtml;
        }

        // ========== UTILITY FUNCTIONS ==========
        function filterCategory(category, element) {
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const name = card.querySelector('.product-name')?.textContent;
                const product = products.find(p => p.name === name);
                
                if (category === 'all' || product?.category === category) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            
            cards.forEach(card => {
                const name = card.querySelector('.product-name')?.textContent.toLowerCase() || '';
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        }

        function shareProduct(platform, url) {
            const text = `تسوق من لا كاليتي بالون`;
            
            let shareUrl = '';
            if (platform === 'facebook') {
                shareUrl = `https://www.facebook.com/sharer.php?u=${encodeURIComponent(url)}`;
            } else if (platform === 'whatsapp') {
                shareUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`;
            }
            
            if (shareUrl) window.open(shareUrl, '_blank');
        }

        function copyProductLink(url) {
            navigator.clipboard.writeText(url);
            showNotification('تم نسخ الرابط');
        }

        // ========== SECTION NAVIGATION ==========
        function showSection(section) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            switch(section) {
                case 'home': showHomeSection(); break;
                case 'favorites': showFavoritesSection(); break;
                case 'cart': showCartSection(); break;
                case 'orders': showOrdersSection(); break;
                case 'track': showTrackSection(); break;
            }
        }

        // ========== INITIAL LOAD ==========
        document.addEventListener('DOMContentLoaded', function() {
            updateBadges();
            showHomeSection();
        });
        // ========== PRODUCT DETAIL NAVIGATION ==========
function showProductDetail(productId) {
    // Navigate to the product page
    window.location.href = `/product/${productId}`;
}
    </script>

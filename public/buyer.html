<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>La Qualité Balloon | لا كاليتي بالون</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Animation Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    
    <style>
        /* ========== DESIGN SYSTEM ========== */
        :root {
            /* Professional Color Palette 2024 */
            --primary-deep-blue: #0B2A4A;      /* عمق وأناقة */
            --primary-rich-gold: #C6A13B;       /* فخامة وتميز */
            --primary-soft-red: #DC4C4C;        /* حيوية وجاذبية */
            --accent-teal: #2A9D8F;              /* لمسة عصرية */
            --accent-cream: #FAF3E0;              /* خلفيات دافئة */
            
            /* Neutrals */
            --bg-light: #F8FAFC;
            --bg-white: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #475569;
            --text-muted: #64748B;
            --border-light: #E2E8F0;
            --border-medium: #CBD5E1;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, var(--primary-deep-blue) 0%, #1A3F5C 100%);
            --gradient-gold: linear-gradient(135deg, var(--primary-rich-gold) 0%, #E5B344 100%);
            --gradient-red: linear-gradient(135deg, var(--primary-soft-red) 0%, #E86A6A 100%);
            
            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 30px rgba(11, 42, 74, 0.12);
            --shadow-xl: 0 20px 40px rgba(11, 42, 74, 0.15);
            --shadow-inner: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            
            /* Border Radius */
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            
            /* Transitions */
            --transition-fast: 0.2s ease;
            --transition-base: 0.3s ease;
            --transition-slow: 0.5s ease;
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-light);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-deep-blue);
            border-radius: var(--radius-full);
            border: 2px solid var(--bg-light);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-rich-gold);
        }

        /* ========== TOP BAR - MODERN GLASS ========== */
        .top-bar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(198, 161, 59, 0.15);
            box-shadow: var(--shadow-sm);
        }

        .store-title {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .arabic-text {
            color: var(--primary-deep-blue);
            position: relative;
            display: inline-block;
        }

        .arabic-text::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gradient-gold);
            border-radius: var(--radius-full);
            transform: scaleX(0.3);
            transform-origin: right;
            transition: transform var(--transition-base);
        }

        .arabic-text:hover::after {
            transform: scaleX(1);
        }

        .french-text {
            color: var(--primary-soft-red);
            font-weight: 700;
            margin-right: 8px;
        }

        .store-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* ========== SEARCH BAR - ELEVATED ========== */
        .search-container {
            padding: 20px 24px 10px;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar {
            background: var(--bg-white);
            padding: 4px 4px 4px 20px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            transition: all var(--transition-base);
        }

        .search-bar:focus-within {
            border-color: var(--primary-rich-gold);
            box-shadow: 0 0 0 4px rgba(198, 161, 59, 0.15);
            transform: translateY(-2px);
        }

        .search-input {
            flex: 1;
            border: none;
            padding: 14px 16px;
            font-size: 16px;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-weight: 500;
        }

        .search-input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .search-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: var(--radius-full);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-md);
        }

        .search-btn:hover {
            transform: scale(1.05);
            background: var(--gradient-gold);
        }

        .search-btn i {
            font-size: 20px;
        }

        /* ========== CATEGORIES - MODERN ========== */
        .categories-section {
            padding: 15px 24px;
        }

        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 4px 20px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background: var(--bg-white);
            padding: 10px 28px;
            border-radius: var(--radius-full);
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 15px;
            transition: all var(--transition-base);
            border: 1px solid var(--border-light);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .category-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity var(--transition-base);
            z-index: 0;
        }

        .category-item span {
            position: relative;
            z-index: 1;
        }

        .category-item:hover {
            border-color: var(--primary-rich-gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .category-item.active {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--primary-deep-blue);
            box-shadow: var(--shadow-lg);
        }

        .category-item.active::before {
            opacity: 1;
        }

        /* ========== PRODUCTS GRID ========== */
        .content {
            padding: 0 24px 90px 24px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .product-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all var(--transition-bounce);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-xl);
            border-color: transparent;
        }

        .product-image-wrapper {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            background: linear-gradient(45deg, #f8f9fa, #e9ecef);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--gradient-red);
            color: white;
            padding: 6px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 700;
            box-shadow: var(--shadow-md);
            z-index: 2;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .product-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.02));
        }

        .product-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            min-height: 44px;
        }

        .price-wrapper {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .current-price {
            color: var(--primary-soft-red);
            font-size: 20px;
            font-weight: 800;
        }

        .original-price {
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .product-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-gold);
            transform: scaleX(0);
            transition: transform var(--transition-base);
        }

        .product-card:hover::after {
            transform: scaleX(1);
        }

        /* ========== PRODUCT DETAIL - LUXURY ========== */
        .product-detail {
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            margin-bottom: 20px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-gallery {
            display: grid;
            grid-template-columns: 1fr 100px;
            gap: 15px;
            padding: 20px;
        }

        .main-image-container {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            aspect-ratio: 1 / 1;
            box-shadow: var(--shadow-md);
        }

        .detail-main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }

        .main-image-container:hover .detail-main-image {
            transform: scale(1.05);
        }

        .thumbnail-images {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: var(--radius-md);
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        .thumbnail:hover,
        .thumbnail.active {
            border-color: var(--primary-rich-gold);
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .detail-info {
            padding: 30px;
        }

        .detail-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-deep-blue);
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .price-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-price {
            font-size: 36px;
            color: var(--primary-soft-red);
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #fff0f1, #ffe5e6);
            padding: 8px 24px;
            border-radius: var(--radius-full);
            border: 1px solid #ffcdd2;
        }

        .detail-price small {
            font-size: 18px;
            font-weight: 600;
            margin-right: 5px;
            color: var(--text-secondary);
        }

        .detail-description {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-light);
            border-radius: var(--radius-lg);
            border-right: 4px solid var(--primary-rich-gold);
        }

        /* Options Styling */
        .options-section {
            margin-bottom: 25px;
        }

        .options-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .options-title i {
            color: var(--primary-rich-gold);
        }

        .color-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .color-option {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--border-light);
            transition: all var(--transition-bounce);
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .color-option.selected {
            border-color: var(--primary-rich-gold);
            transform: scale(1.15);
            box-shadow: 0 0 0 3px rgba(198, 161, 59, 0.3);
        }

        .color-option.selected::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .color-option.out-of-stock {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .feature-values {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .feature-value {
            background: var(--bg-light);
            padding: 12px 24px;
            border-radius: var(--radius-full);
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: all var(--transition-base);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .feature-value:hover {
            border-color: var(--primary-rich-gold);
            background: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .feature-value.selected {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--primary-deep-blue);
            box-shadow: var(--shadow-lg);
        }

        /* Quantity Selector */
        .quantity-section {
            margin-bottom: 30px;
        }

        .quantity-selector {
            display: inline-flex;
            align-items: center;
            background: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            padding: 6px;
            box-shadow: var(--shadow-inner);
        }

        .quantity-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: white;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quantity-btn:hover:not(:disabled) {
            background: var(--gradient-primary);
            color: white;
            transform: scale(1.1);
        }

        .quantity-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .quantity-input {
            width: 70px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            outline: none;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-direction: row;
        }

        .btn {
            flex: 1;
            padding: 18px 24px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--transition-bounce);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--gradient-red);
            color: white;
            box-shadow: 0 10px 20px rgba(220, 76, 76, 0.3);
        }

        .btn-secondary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 10px 20px rgba(11, 42, 74, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-deep-blue);
            color: var(--primary-deep-blue);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-xl);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ========== CART SECTION ========== */
        .section-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary-deep-blue);
            margin: 20px 0 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            padding-bottom: 10px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 80px;
            height: 4px;
            background: var(--gradient-gold);
            border-radius: var(--radius-full);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cart-item {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            gap: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            position: relative;
            transition: all var(--transition-base);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-rich-gold);
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-md);
            object-fit: cover;
            border: 2px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        .cart-item-content {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 18px;
        }

        .cart-item-features {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.7;
            background: var(--bg-light);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            display: inline-block;
        }

        .cart-item-price-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .cart-item-price {
            color: var(--primary-soft-red);
            font-weight: 800;
            font-size: 20px;
        }

        .cart-item-quantity {
            background: var(--bg-light);
            padding: 6px 15px;
            border-radius: var(--radius-full);
            font-weight: 700;
            color: var(--text-secondary);
        }

        .cart-item-remove {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #fee2e2;
            color: var(--primary-soft-red);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all var(--transition-base);
        }

        .cart-item-remove:hover {
            background: var(--primary-soft-red);
            color: white;
            transform: rotate(90deg);
        }

        /* Delivery Form */
        .form-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-base);
        }

        .form-card:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-rich-gold);
        }

        .form-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary-deep-blue);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-title i {
            color: var(--primary-rich-gold);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-input,
        .wilaya-select {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            background: var(--bg-light);
            color: var(--text-primary);
            transition: all var(--transition-base);
            outline: none;
        }

        .form-input:focus,
        .wilaya-select:focus {
            border-color: var(--primary-rich-gold);
            background: white;
            box-shadow: 0 0 0 4px rgba(198, 161, 59, 0.1);
        }

        .delivery-options {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .delivery-option {
            flex: 1;
            background: var(--bg-light);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-base);
            font-weight: 600;
            color: var(--text-secondary);
        }

        .delivery-option.selected {
            background: var(--gradient-primary);
            border-color: var(--primary-deep-blue);
            color: white;
            box-shadow: var(--shadow-lg);
        }

        .delivery-option i {
            display: block;
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* Order Summary */
        .order-summary {
            background: var(--gradient-primary);
            color: white;
            border-radius: var(--radius-lg);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-xl);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
            opacity: 0.9;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255,255,255,0.3);
            font-weight: 800;
            font-size: 24px;
        }

        /* ========== ORDER TRACKING ========== */
        .tracking-container {
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            padding: 30px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .track-input-wrapper {
            position: relative;
            max-width: 400px;
            margin: 30px auto;
        }

        .track-input {
            width: 100%;
            padding: 18px 25px;
            border: 3px dashed var(--border-medium);
            border-radius: var(--radius-full);
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 12px;
            background: var(--bg-light);
            outline: none;
            transition: all var(--transition-base);
            direction: ltr;
        }

        .track-input:focus {
            border-color: var(--primary-rich-gold);
            background: white;
            box-shadow: 0 0 0 6px rgba(198, 161, 59, 0.15);
        }

        .status-timeline {
            margin: 40px 0;
            position: relative;
            padding: 20px 0;
        }

        .status-step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
            position: relative;
            padding-right: 60px;
        }

        .status-step:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 24px;
            top: 45px;
            bottom: -15px;
            width: 3px;
            background: linear-gradient(to bottom, var(--border-light), var(--primary-rich-gold));
        }

        .status-icon {
            position: absolute;
            right: 0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-light);
            border: 3px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            color: var(--text-muted);
            transition: all var(--transition-base);
        }

        .status-icon.completed {
            background: var(--accent-teal);
            border-color: var(--accent-teal);
            color: white;
            box-shadow: 0 0 0 4px rgba(42, 157, 143, 0.3);
        }

        .status-icon.active {
            border-color: var(--primary-rich-gold);
            color: var(--primary-rich-gold);
            background: white;
            box-shadow: 0 0 0 6px rgba(198, 161, 59, 0.2);
            animation: pulse 2s infinite;
        }

        .status-content {
            text-align: right;
        }

        .status-title {
            font-weight: 800;
            color: var(--text-primary);
            font-size: 18px;
            margin-bottom: 5px;
        }

        .status-date {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ========== BOTTOM NAVIGATION ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
            border-top: 1px solid rgba(198, 161, 59, 0.15);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 12px;
            flex: 1;
            transition: all var(--transition-base);
            position: relative;
            border-radius: var(--radius-full);
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 5px;
            transition: all var(--transition-base);
        }

        .nav-item.active {
            color: var(--primary-deep-blue);
            background: rgba(11, 42, 74, 0.05);
        }

        .nav-item.active i {
            transform: translateY(-5px);
            color: var(--primary-rich-gold);
        }

        .cart-badge {
            background: var(--gradient-red);
            color: white;
            border-radius: var(--radius-full);
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            min-width: 20px;
            text-align: center;
            border: 2px solid white;
            box-shadow: var(--shadow-md);
        }

        /* ========== NOTIFICATIONS ========== */
        .notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--text-primary);
            color: white;
            padding: 16px 32px;
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-xl);
            z-index: 2000;
            display: none;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            opacity: 0;
            transition: all var(--transition-base);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .notification.success {
            background: linear-gradient(135deg, var(--accent-teal), #238b7e);
        }

        .notification.error {
            background: var(--gradient-red);
        }

        /* ========== EMPTY STATES ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 80px;
            color: var(--border-medium);
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: 10px;
            font-size: 24px;
        }

        /* ========== LOADING ANIMATIONS ========== */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ========== RESPONSIVE DESIGN ========== */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }

            .detail-gallery {
                grid-template-columns: 1fr;
            }

            .thumbnail-images {
                flex-direction: row;
                overflow-x: auto;
                padding: 10px 0;
            }

            .thumbnail {
                width: 80px;
                flex-shrink: 0;
            }

            .action-buttons {
                flex-direction: column;
            }

            .detail-title {
                font-size: 24px;
            }

            .detail-price {
                font-size: 28px;
            }

            .search-container {
                padding: 15px 16px;
            }
        }

        @media (max-width: 480px) {
            .store-title {
                font-size: 22px;
            }

            .product-name {
                font-size: 14px;
            }

            .current-price {
                font-size: 18px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 14px;
            }

            .cart-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .cart-item-image {
                width: 100%;
                height: 200px;
            }
        }

        /* Print Styles */
        @media print {
            .bottom-nav,
            .search-container,
            .btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar" data-aos="fade-down">
        <div class="store-title">
            <span class="arabic-text">لا كاليتي</span>
            <span class="french-text">BALLOON</span>
        </div>
        <div class="store-subtitle">QUALITÉ & EXCELLENCE</div>
    </div>

    <!-- Dynamic Content Area -->
    <div class="content" id="contentArea"></div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showSection('home')">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="showSection('cart')">
            <i class="fas fa-shopping-bag"></i>
            <span>السلة</span>
            <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
        </div>
        <div class="nav-item" onclick="showSection('track')">
            <i class="fas fa-map-marker-alt"></i>
            <span>تتبع</span>
        </div>
        <div class="nav-item" onclick="showSection('account')">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        // Initialize AOS
        AOS.init({
            duration: 800,
            once: true,
            offset: 50
        });

        // ========== GLOBAL VARIABLES ==========
        let products = [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentProduct = null;
        let selectedWilaya = null;
        let deliveryCost = 0;
        let deliveryType = 'normal';
        let wilayas = [];

        // ========== INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', function() {
            loadHomeSection();
            updateCartBadge();
            loadWilayas();
        });

        async function loadWilayas() {
            try {
                const response = await fetch('/api/wilayas');
                wilayas = await response.json();
            } catch (error) {
                console.error('خطأ في تحميل الولايات:', error);
            }
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (total > 0) {
                badge.style.display = 'block';
                badge.textContent = total;
                badge.style.animation = 'pulse 0.3s ease';
                setTimeout(() => {
                    badge.style.animation = '';
                }, 300);
            } else {
                badge.style.display = 'none';
            }
        }

        function showSection(section) {
            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Scroll to top smoothly
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Load section
            switch(section) {
                case 'home': loadHomeSection(); break;
                case 'cart': loadCartSection(); break;
                case 'track': loadTrackSection(); break;
                case 'account': loadAccountSection(); break;
            }
        }

        // ========== HOME SECTION ==========
        async function loadHomeSection() {
            showLoading();
            
            try {
                const response = await fetch('/api/products');
                products = await response.json();

                let html = `
                    <div class="fade-in">
                        <div class="search-container" data-aos="fade-up">
                            <div class="search-wrapper">
                                <div class="search-bar">
                                    <input type="text" class="search-input" placeholder="ابحث عن البالونات المثالية..." id="searchInput">
                                    <button class="search-btn" onclick="searchProducts()">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="categories-section" data-aos="fade-up" data-aos-delay="100">
                            <div class="categories">
                                <div class="category-item active" onclick="filterCategory('all')">
                                    <span>الكل</span>
                                </div>
                `;

                // Add categories
                const categories = [...new Set(products.map(p => p.category).filter(c => c))];
                categories.forEach(cat => {
                    html += `<div class="category-item" onclick="filterCategory('${cat}')"><span>${cat}</span></div>`;
                });

                html += `
                            </div>
                        </div>

                        <div class="products-grid" id="productsGrid" data-aos="fade-up" data-aos-delay="200">
                `;

                if (products.length === 0) {
                    html += `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fas fa-balloon"></i>
                            <h3>لا توجد منتجات حالياً</h3>
                            <p>نعمل على إضافة تشكيلة مميزة قريباً</p>
                        </div>
                    `;
                } else {
                    products.forEach(product => {
                        const lowestPrice = product.basePrice + (product.features?.[0]?.options?.[0]?.price || 0);
                        html += `
                            <div class="product-card" onclick="showProductDetail('${product._id}')" data-aos="zoom-in">
                                <div class="product-image-wrapper">
                                    <img src="/uploads/${product.mainImage || 'default.jpg'}" 
                                         class="product-image" 
                                         onerror="this.src='https://via.placeholder.com/300x300?text=لا+توجد+صورة'"
                                         loading="lazy">
                                    ${product.features?.length > 0 ? '<span class="product-badge">جديد</span>' : ''}
                                </div>
                                <div class="product-info">
                                    <div class="product-name">${product.name}</div>
                                    <div class="price-wrapper">
                                        <span class="current-price">${lowestPrice.toLocaleString()} د.ج</span>
                                        ${product.basePrice < lowestPrice ? `<span class="original-price">${product.basePrice.toLocaleString()} د.ج</span>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                html += `</div></div>`;
                document.getElementById('contentArea').innerHTML = html;
                
                // Refresh AOS
                AOS.refresh();
                
            } catch (error) {
                showNotification('عذراً، حدث خطأ في تحميل المنتجات', 'error');
                console.error(error);
            }
        }

        function filterCategory(category) {
            // Update active category
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Filter products
            const grid = document.getElementById('productsGrid');
            const cards = grid.children;
            
            for (let card of cards) {
                if (category === 'all') {
                    card.style.display = 'flex';
                } else {
                    const productName = card.querySelector('.product-name')?.textContent || '';
                    const productCategory = products.find(p => p.name === productName)?.category;
                    
                    if (productCategory === category) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                }
            }
        }

        function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('productsGrid');
            const cards = grid.children;
            
            for (let card of cards) {
                const name = card.querySelector('.product-name')?.textContent.toLowerCase() || '';
                if (name.includes(searchTerm) || searchTerm === '') {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            }
        }

        // ========== PRODUCT DETAIL ==========
        async function showProductDetail(productId) {
            showLoading();
            
            try {
                const response = await fetch(`/api/products/${productId}`);
                currentProduct = await response.json();

                let html = `
                    <div class="fade-in">
                        <div class="detail-header" style="margin: 20px 0;">
                            <button class="btn btn-outline" onclick="loadHomeSection()" style="width: auto; padding: 12px 24px;">
                                <i class="fas fa-arrow-right"></i> رجوع
                            </button>
                        </div>

                        <div class="product-detail">
                            <div class="detail-gallery">
                                <div class="main-image-container" id="mainImageContainer">
                                    <img src="/uploads/${currentProduct.mainImage || 'default.jpg'}" 
                                         class="detail-main-image" 
                                         id="mainProductImage"
                                         onerror="this.src='https://via.placeholder.com/600x600?text=صورة+المنتج'">
                                </div>
                                
                                ${currentProduct.additionalImages?.length > 0 ? `
                                    <div class="thumbnail-images">
                                        <img src="/uploads/${currentProduct.mainImage}" 
                                             class="thumbnail active" 
                                             onclick="changeMainImage(this.src)">
                                        ${currentProduct.additionalImages.map(img => `
                                            <img src="/uploads/${img}" 
                                                 class="thumbnail" 
                                                 onclick="changeMainImage(this.src)">
                                        `).join('')}
                                    </div>
                                ` : ''}
                            </div>

                            <div class="detail-info">
                                <h1 class="detail-title">${currentProduct.name}</h1>
                                
                                <div class="price-container">
                                    <div class="detail-price" id="dynamicPrice">
                                        ${currentProduct.basePrice.toLocaleString()} <small>د.ج</small>
                                    </div>
                                </div>

                                <div class="detail-description">
                                    ${currentProduct.description || 'لا يوجد وصف متاح لهذا المنتج حالياً.'}
                                </div>

                                ${currentProduct.colors?.length > 0 ? `
                                    <div class="options-section">
                                        <div class="options-title">
                                            <i class="fas fa-palette"></i> اختر اللون المفضل
                                        </div>
                                        <div class="color-options" id="colorOptions">
                                            ${currentProduct.colors.map((color, index) => `
                                                <div class="color-option ${color.stock === 0 ? 'out-of-stock' : ''} ${index === 0 ? 'selected' : ''}" 
                                                     style="background: ${color.hexCode};" 
                                                     onclick="selectColor('${color.hexCode}', ${color.stock}, this)"
                                                     title="${color.name}${color.stock === 0 ? ' (غير متوفر)' : ''}">
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}

                                <div id="featuresSection">
                                    ${currentProduct.features?.map((feature, fIndex) => `
                                        <div class="options-section">
                                            <div class="options-title">
                                                <i class="fas fa-tag"></i> ${feature.name}
                                            </div>
                                            <div class="feature-values" id="feature_${fIndex}">
                                                ${feature.options.map((option, oIndex) => `
                                                    <div class="feature-value ${option.stock === 0 ? 'out-of-stock' : ''} ${fIndex === 0 && oIndex === 0 ? 'selected' : ''}" 
                                                         onclick="selectFeature(${fIndex}, ${oIndex}, ${option.price}, ${option.stock}, this)"
                                                         data-price="${option.price}">
                                                        ${option.value}
                                                        ${option.price > 0 ? ` <span style="color: var(--primary-rich-gold);">(+${option.price.toLocaleString()} د.ج)</span>` : ''}
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    `).join('') || ''}
                                </div>

                                <div class="options-section">
                                    <div class="options-title">
                                        <i class="fas fa-sort-amount-up"></i> الكمية
                                    </div>
                                    <div class="quantity-selector">
                                        <button class="quantity-btn" onclick="changeQuantity(-1)" id="decreaseBtn">
                                            <i class="fas fa-minus"></i>
                                        </button>
                                        <input type="number" class="quantity-input" id="quantity" value="1" min="1" max="99" readonly>
                                        <button class="quantity-btn" onclick="changeQuantity(1)" id="increaseBtn">
                                            <i class="fas fa-plus"></i>
                                        </button>
                                    </div>
                                </div>

                                <div class="action-buttons">
                                    <button class="btn btn-secondary" onclick="addToCart()" id="addToCartBtn">
                                        <i class="fas fa-cart-plus"></i> أضف إلى السلة
                                    </button>
                                    <button class="btn btn-primary" onclick="buyNow()">
                                        <i class="fas fa-bolt"></i> شراء الآن
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('contentArea').innerHTML = html;
                
                // Initialize selected features
                window.selectedFeatures = [];
                window.selectedColor = currentProduct.colors?.[0] || null;
                
                if (currentProduct.features) {
                    currentProduct.features.forEach((feature, fIndex) => {
                        if (feature.options.length > 0) {
                            selectFeature(fIndex, 0, feature.options[0].price, feature.options[0].stock, 
                                document.querySelector(`#feature_${fIndex} .feature-value`));
                        }
                    });
                }
                
                // Refresh AOS
                AOS.refresh();
                
            } catch (error) {
                showNotification('عذراً، حدث خطأ في تحميل تفاصيل المنتج', 'error');
                console.error(error);
            }
        }

        function changeMainImage(src) {
            document.getElementById('mainProductImage').src = src;
            document.querySelectorAll('.thumbnail').forEach(thumb => {
                thumb.classList.remove('active');
                if (thumb.src === src) {
                    thumb.classList.add('active');
                }
            });
        }

        function changeQuantity(delta) {
            const input = document.getElementById('quantity');
            const currentValue = parseInt(input.value);
            const newValue = currentValue + delta;
            
            if (newValue >= 1 && newValue <= 99) {
                input.value = newValue;
                
                // Button animation
                const btn = delta > 0 ? document.getElementById('increaseBtn') : document.getElementById('decreaseBtn');
                btn.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    btn.style.transform = '';
                }, 100);
            }
        }

        function selectColor(hexCode, stock, element) {
            if (stock === 0) {
                showNotification('عذراً، هذا اللون غير متوفر حالياً', 'error');
                return;
            }
            
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            window.selectedColor = currentProduct.colors.find(c => c.hexCode === hexCode);
            
            // Show color name
            showNotification(`تم اختيار: ${window.selectedColor.name}`, 'success');
        }

        function selectFeature(featureIndex, optionIndex, price, stock, element) {
            if (stock === 0) {
                showNotification('عذراً، هذا الخيار غير متوفر حالياً', 'error');
                return;
            }
            
            document.querySelectorAll(`#feature_${featureIndex} .feature-value`).forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            
            if (!window.selectedFeatures) window.selectedFeatures = [];
            window.selectedFeatures[featureIndex] = {
                featureIndex, optionIndex, price,
                featureName: currentProduct.features[featureIndex].name,
                optionValue: element.textContent.split('(+')[0].trim()
            };
            
            updatePrice();
        }

        function updatePrice() {
            let additionalPrice = 0;
            if (window.selectedFeatures) {
                additionalPrice = window.selectedFeatures.reduce((sum, f) => sum + (f?.price || 0), 0);
            }
            const totalPrice = currentProduct.basePrice + additionalPrice;
            document.getElementById('dynamicPrice').innerHTML = `${totalPrice.toLocaleString()} <small>د.ج</small>`;
        }

        function calculateItemPrice() {
            let additionalPrice = window.selectedFeatures?.reduce((sum, f) => sum + (f?.price || 0), 0) || 0;
            return currentProduct.basePrice + additionalPrice;
        }

        function addToCart() {
            const quantity = parseInt(document.getElementById('quantity').value);
            
            const cartItem = {
                productId: currentProduct._id,
                name: currentProduct.name,
                basePrice: currentProduct.basePrice,
                selectedFeatures: window.selectedFeatures?.filter(f => f).map(f => ({
                    featureName: f.featureName,
                    selectedOption: f.optionValue,
                    additionalPrice: f.price
                })) || [],
                selectedColor: window.selectedColor ? {
                    name: window.selectedColor.name,
                    hexCode: window.selectedColor.hexCode
                } : null,
                quantity: quantity,
                totalPrice: calculateItemPrice() * quantity,
                image: currentProduct.mainImage
            };
            
            cart.push(cartItem);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            
            // Animation for add to cart button
            const btn = document.getElementById('addToCartBtn');
            btn.innerHTML = '<i class="fas fa-check"></i> تمت الإضافة';
            btn.style.background = 'var(--accent-teal)';
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-cart-plus"></i> أضف إلى السلة';
                btn.style.background = '';
            }, 1500);
            
            showNotification('تمت الإضافة إلى السلة بنجاح', 'success');
        }

        function selectDeliveryType(type, element) {
            document.querySelectorAll('.delivery-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            deliveryType = type;
            calculateDelivery();
        }

        async function calculateDelivery() {
            const wilayaSelect = document.getElementById('wilayaSelect');
            const wilayaCode = wilayaSelect.value;
            
            if (!wilayaCode) {
                document.getElementById('deliveryCost').innerHTML = '<i class="fas fa-exclamation-circle"></i> الرجاء اختيار الولاية';
                return;
            }

            try {
                const response = await fetch('/api/calculate-delivery', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        wilayaCode: parseInt(wilayaCode), 
                        deliveryType 
                    })
                });

                const data = await response.json();
                
                if (data.available) {
                    deliveryCost = data.cost;
                    const wilayaName = wilayaSelect.options[wilayaSelect.selectedIndex].text;
                    
                    document.getElementById('deliveryCost').innerHTML = `
                        <i class="fas fa-check-circle" style="color: var(--accent-teal);"></i> 
                        التوصيل إلى ${wilayaName}: ${deliveryCost.toLocaleString()} د.ج
                    `;
                    
                    document.getElementById('deliveryDisplay').textContent = deliveryCost.toLocaleString() + ' د.ج';
                    
                    const subtotal = cart.reduce((sum, item) => sum + item.totalPrice, 0);
                    document.getElementById('totalAmount').textContent = (subtotal + deliveryCost).toLocaleString() + ' د.ج';
                    
                    // Animation for total
                    const totalElement = document.getElementById('totalAmount');
                    totalElement.style.transform = 'scale(1.1)';
                    setTimeout(() => {
                        totalElement.style.transform = '';
                    }, 200);
                    
                } else {
                    document.getElementById('deliveryCost').innerHTML = `
                        <i class="fas fa-times-circle" style="color: var(--primary-soft-red);"></i> 
                        ${data.message || 'التوصيل غير متاح لهذه المنطقة حالياً'}
                    `;
                    deliveryCost = 0;
                }
            } catch (error) {
                showNotification('حدث خطأ في حساب تكلفة التوصيل', 'error');
                console.error(error);
            }
        }

        function removeFromCart(index) {
            // Animation before removal
            const cartItem = document.querySelectorAll('.cart-item')[index];
            cartItem.style.transform = 'translateX(-100px)';
            cartItem.style.opacity = '0';
            
            setTimeout(() => {
                cart.splice(index, 1);
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartBadge();
                loadCartSection();
                showNotification('تم إزالة المنتج من السلة', 'success');
            }, 300);
        }

        async function placeOrder() {
            // Validate form
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const notes = document.getElementById('customerNotes')?.value.trim() || '';
            const wilayaSelect = document.getElementById('wilayaSelect');
            const wilaya = wilayaSelect.options[wilayaSelect.selectedIndex]?.text;
            const wilayaCode = wilayaSelect.value;

            // Validation
            if (!name || !phone || !address || !wilayaCode) {
                showNotification('الرجاء إكمال جميع المعلومات المطلوبة', 'error');
                
                // Highlight empty fields
                if (!name) document.getElementById('customerName').style.borderColor = 'var(--primary-soft-red)';
                if (!phone) document.getElementById('customerPhone').style.borderColor = 'var(--primary-soft-red)';
                if (!address) document.getElementById('customerAddress').style.borderColor = 'var(--primary-soft-red)';
                if (!wilayaCode) wilayaSelect.style.borderColor = 'var(--primary-soft-red)';
                
                return;
            }

            // Phone validation (Algerian numbers)
            const phoneRegex = /^(05|06|07)[0-9]{8}$/;
            if (!phoneRegex.test(phone)) {
                showNotification('رقم الهاتف غير صحيح (يجب أن يبدأ بـ 05 أو 06 أو 07 ويتكون من 10 أرقام)', 'error');
                document.getElementById('customerPhone').style.borderColor = 'var(--primary-soft-red)';
                return;
            }

            if (deliveryCost === 0) {
                showNotification('الرجاء اختيار الولاية لحساب تكلفة التوصيل', 'error');
                wilayaSelect.style.borderColor = 'var(--primary-soft-red)';
                return;
            }

            // Disable button and show loading
            const orderBtn = document.getElementById('orderBtn');
            orderBtn.disabled = true;
            orderBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري معالجة الطلب...';

            try {
                const orderData = {
                    products: cart.map(item => ({
                        productId: item.productId,
                        name: item.name,
                        selectedFeatures: item.selectedFeatures,
                        selectedColor: item.selectedColor,
                        quantity: item.quantity,
                        priceAtTime: item.totalPrice / item.quantity
                    })),
                    customerInfo: { 
                        name, 
                        phone, 
                        address, 
                        wilaya,
                        notes 
                    },
                    deliveryCost,
                    totalAmount: cart.reduce((sum, item) => sum + item.totalPrice, 0) + deliveryCost
                };

                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (data.success) {
                    // Clear cart
                    cart = [];
                    localStorage.removeItem('cart');
                    updateCartBadge();
                    
                    // Show success page
                    document.getElementById('contentArea').innerHTML = `
                        <div class="fade-in empty-state" style="padding-top: 40px;">
                            <div style="width: 100px; height: 100px; background: linear-gradient(135deg, var(--accent-teal), #238b7e); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; color: white; font-size: 50px; box-shadow: 0 20px 30px rgba(42, 157, 143, 0.3); animation: pulse 2s infinite;">
                                <i class="fas fa-check"></i>
                            </div>
                            
                            <h2 style="color: var(--text-primary); margin-bottom: 15px; font-size: 32px;">تم استلام طلبك بنجاح!</h2>
                            
                            <p style="color: var(--text-secondary); margin-bottom: 25px; font-size: 18px;">شكراً لثقتك بـ لا كاليتي بالون</p>
                            
                            <div style="background: linear-gradient(135deg, var(--primary-deep-blue), #1A3F5C); padding: 30px; border-radius: var(--radius-xl); margin: 30px 0; color: white; box-shadow: var(--shadow-xl);">
                                <div style="font-size: 16px; opacity: 0.9; margin-bottom: 10px;">رقم تتبع طلبك</div>
                                <div style="font-size: 48px; font-weight: 900; letter-spacing: 10px; direction: ltr; background: rgba(255,255,255,0.1); padding: 20px; border-radius: var(--radius-lg); border: 2px dashed rgba(255,255,255,0.3);">
                                    ${data.orderNumber}
                                </div>
                                <p style="margin-top: 20px; font-size: 14px; opacity: 0.8;">
                                    <i class="fas fa-info-circle"></i> احتفظ بهذا الرقم لتتبع طلبك
                                </p>
                            </div>
                            
                            <div class="action-buttons" style="max-width: 400px; margin: 30px auto;">
                                <button class="btn btn-secondary" onclick="showSection('track')" style="flex: 1;">
                                    <i class="fas fa-map-marker-alt"></i> تتبع الطلب
                                </button>
                                <button class="btn btn-primary" onclick="loadHomeSection()" style="flex: 1;">
                                    <i class="fas fa-home"></i> العودة للرئيسية
                                </button>
                            </div>
                        </div>
                    `;
                    
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    
                } else {
                    showNotification('عذراً، حدث خطأ في النظام. يرجى المحاولة مرة أخرى.', 'error');
                    resetOrderBtn();
                }
            } catch (error) {
                showNotification('خطأ في الاتصال، يرجى التحقق من الإنترنت', 'error');
                console.error(error);
                resetOrderBtn();
            }

            function resetOrderBtn() {
                orderBtn.disabled = false;
                orderBtn.innerHTML = '<i class="fas fa-check-circle"></i> تأكيد الطلب (الدفع عند الاستلام)';
            }
        }

        async function trackOrder() {
            const trackNumber = document.getElementById('trackNumber').value.trim();
            
            if (!trackNumber || trackNumber.length !== 6 || !/^\d+$/.test(trackNumber)) {
                showNotification('الرجاء إدخال رقم تتبع صحيح (6 أرقام)', 'error');
                
                // Shake animation for input
                const input = document.getElementById('trackNumber');
                input.style.animation = 'shake 0.3s ease';
                setTimeout(() => {
                    input.style.animation = '';
                }, 300);
                
                return;
            }

            const trackBtn = document.getElementById('trackBtn');
            const originalText = trackBtn.innerHTML;
            trackBtn.disabled = true;
            trackBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري البحث...';

            try {
                const response = await fetch(`/api/orders/track/${trackNumber}`);
                
                if (!response.ok) {
                    throw new Error('Order not found');
                }
                
                const order = await response.json();

                // Map status to steps
                const statuses = ['قيد المراجعة', 'تم التأكيد', 'تم الشحن', 'تم التسليم'];
                const currentIndex = statuses.indexOf(order.status);
                
                let timelineHtml = `
                    <div class="fade-in tracking-container" style="margin-top: 30px;" data-aos="fade-up">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border-light);">
                            <h3 style="color: var(--primary-deep-blue); font-size: 24px;">
                                <i class="fas fa-hashtag" style="color: var(--primary-rich-gold);"></i>
                                طلب رقم: ${order.orderNumber}
                            </h3>
                            <span style="background: ${order.status === 'تم التسليم' ? 'var(--accent-teal)' : order.status === 'ملغي' ? 'var(--primary-soft-red)' : 'var(--primary-rich-gold)'}; color: white; padding: 8px 20px; border-radius: var(--radius-full); font-weight: bold;">
                                ${order.status}
                            </span>
                        </div>
                        
                        <div class="status-timeline">
                `;

                statuses.forEach((status, index) => {
                    let statusClass = '';
                    let icon = 'fa-circle';
                    
                    if (index < currentIndex) {
                        statusClass = 'completed';
                        icon = 'fa-check';
                    } else if (index === currentIndex) {
                        statusClass = 'active';
                        icon = index === 0 ? 'fa-clipboard-list' : 
                               index === 1 ? 'fa-check-circle' : 
                               index === 2 ? 'fa-truck' : 'fa-home';
                    }
                    
                    timelineHtml += `
                        <div class="status-step ${statusClass}">
                            <div class="status-icon ${statusClass}">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div class="status-content">
                                <div class="status-title">${status}</div>
                                <div class="status-date">
                                    ${index === currentIndex ? 'الحالية' : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });

                if (order.status === 'ملغي') {
                    timelineHtml += `
                        <div style="background: #fee2e2; padding: 20px; border-radius: var(--radius-md); color: var(--primary-soft-red); font-weight: bold; margin-top: 20px;">
                            <i class="fas fa-times-circle"></i> هذا الطلب ملغي
                            ${order.returnReason ? `<p style="margin-top: 10px; font-size: 14px;">السبب: ${order.returnReason}</p>` : ''}
                        </div>
                    `;
                }

                // Order summary
                timelineHtml += `
                        </div>
                        
                        <div style="margin-top: 40px; padding: 25px; background: linear-gradient(135deg, #f8f9fa, #e9ecef); border-radius: var(--radius-lg); border: 1px solid var(--border-light);">
                            <h4 style="color: var(--text-primary); margin-bottom: 20px; font-size: 18px;">
                                <i class="fas fa-receipt" style="color: var(--primary-rich-gold);"></i>
                                ملخص الطلب
                            </h4>
                            
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                                <div>
                                    <div style="color: var(--text-muted); font-size: 13px;">الاسم</div>
                                    <div style="font-weight: 700; color: var(--text-primary);">${order.customerInfo.name}</div>
                                </div>
                                <div>
                                    <div style="color: var(--text-muted); font-size: 13px;">الهاتف</div>
                                    <div style="font-weight: 700; color: var(--text-primary);" dir="ltr">${order.customerInfo.phone}</div>
                                </div>
                                <div>
                                    <div style="color: var(--text-muted); font-size: 13px;">الولاية</div>
                                    <div style="font-weight: 700; color: var(--text-primary);">${order.customerInfo.wilaya}</div>
                                </div>
                                <div>
                                    <div style="color: var(--text-muted); font-size: 13px;">الإجمالي</div>
                                    <div style="font-weight: 900; color: var(--primary-soft-red); font-size: 20px;">${order.totalAmount.toLocaleString()} د.ج</div>
                                </div>
                            </div>
                            
                            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--border-medium);">
                                <div style="color: var(--text-muted); font-size: 13px;">العنوان</div>
                                <div style="font-weight: 600; color: var(--text-primary);">${order.customerInfo.address}</div>
                            </div>
                            
                            ${order.customerInfo.notes ? `
                                <div style="margin-top: 20px;">
                                    <div style="color: var(--text-muted); font-size: 13px;">ملاحظات</div>
                                    <div style="font-weight: 500; color: var(--text-secondary); background: white; padding: 10px; border-radius: var(--radius-sm);">${order.customerInfo.notes}</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;

                document.getElementById('trackResult').innerHTML = timelineHtml;
                AOS.refresh();

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Add shake animation keyframes if not exists
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
